function renderPolls(){
  const u = state.currentUser;
  const isAdmin = u.role==='admin';
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  return `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Enquetes</div>
        ${isAdmin ? `<button class="btn btn-primary" id="newPollBtn">${svgIcon('add')} Nova Enquete</button>` : ''}
      </div>
      ${state.polls.length===0 ? `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Nenhuma enquete ainda</div><div class="empty-text">O admin pode criar enquetes para o time votar.</div></div>` :
        state.polls.map(poll=>{
          const votes = state.pollVotes.filter(v=>v.poll_id===poll.id);
          const myVote = votes.find(v=>v.user_id===u.id);
          const total = votes.length;
          const options = poll.options;
          const counts = options.map((_,i)=>votes.filter(v=>v.option_index===i).length);
          const maxCount = Math.max(...counts);
          return `
            <div class="poll-card">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <span class="badge badge-category">${poll.active?'✦ Ativa':'Encerrada'}</span>
                <span style="font-size:11px;color:var(--muted)">${fmt(poll.created_at)}</span>
              </div>
              <div class="poll-question">${poll.question}</div>
              ${options.map((opt,i)=>{
                const count = counts[i];
                const pct = total>0 ? Math.round(count/total*100) : 0;
                const isWinner = count===maxCount && count>0;
                const voted = myVote?.option_index===i;
                if(myVote || !poll.active){
                  return `<div class="poll-option">
                    <div class="poll-bar-wrap">
                      <div class="poll-bar-label"><span>${opt}${voted?' ✓':''}</span><span>${pct}%${isAdmin?` (${count} voto${count!==1?'s':''})`:(myVote?` (${total} voto${total!==1?'s':''})`:'')}</span></div>
                      <div class="poll-bar-bg"><div class="poll-bar-fill ${isWinner?'winner':''}" style="width:${pct}%"></div></div>
                    </div>
                  </div>`;
                }
                return `<div class="poll-option">
                  <button class="poll-option-btn" data-vote-poll="${poll.id}" data-vote-opt="${i}">${opt}</button>
                </div>`;
              }).join('')}
              <div class="poll-footer">
                ${total} voto${total!==1?'s':''} · ${poll.active?'Votação aberta':'Votação encerrada'}
                ${isAdmin && poll.active ? `<button class="btn btn-secondary btn-sm" style="margin-left:12px" data-close-poll="${poll.id}">Encerrar</button>` : ''}
              ${isAdmin ? `<button class="btn btn-danger btn-sm" style="margin-left:8px" data-delete-poll="${poll.id}" data-delete-poll-title="${poll.question.replace(/"/g,'&quot;')}">🗑 Excluir</button>` : ''}
              </div>
            </div>`;
        }).join('')}
    </div>`;
}

function renderEvals(){
  const u = state.currentUser;
  const canEval = u.role==='admin' || u.role==='leader';
  const criteria = ['Desempenho','Comunicação','Trabalho em Equipe','Pontualidade','Qualidade'];
  const myEvals = canEval
    ? (u.role==='admin' ? state.evaluations : state.evaluations.filter(e=>e.from_id===u.id))
    : state.evaluations.filter(e=>e.to_id===u.id);

  return `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Avaliações de Desempenho</div>
        ${canEval ? `<button class="btn btn-primary" id="newEvalBtn">${svgIcon('add')} Nova Avaliação</button>` : ''}
      </div>
      ${myEvals.length===0 ? `<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-title">Nenhuma avaliação ainda</div><div class="empty-text">${canEval?'Clique em Nova Avaliação para avaliar um colaborador.':'Suas avaliações de desempenho aparecerão aqui.'}</div></div>` :
        myEvals.map(ev=>{
          const from = getUserById(ev.from_id);
          const to = getUserById(ev.to_id);
          const scores = ev.scores;
          const avg = Object.values(scores).length>0 ? (Object.values(scores).reduce((a,b)=>a+b,0)/Object.values(scores).length).toFixed(1) : '-';
          const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
          return `
            <div class="eval-card">
              <div class="eval-header">
                <div class="avatar">${to?initials(to.name):'?'}</div>
                <div>
                  <div class="eval-name">${to?to.name:'?'}</div>
                  <div class="eval-period">${months[(ev.month||1)-1]}/${ev.year} · Por ${from?from.name:'?'} · Média: <strong>${avg}/5</strong></div>
                </div>
              </div>
              <div class="eval-criteria">
                ${criteria.map(c=>`
                  <div class="eval-row">
                    <div class="eval-label">${c}</div>
                    <div class="eval-score-display">
                      ${[1,2,3,4,5].map(n=>`<div class="eval-score-dot ${(scores[c]||0)>=n?'filled':''}"></div>`).join('')}
                      <span style="font-size:12px;color:var(--muted);margin-left:6px">${scores[c]||'-'}/5</span>
                    </div>
                  </div>`).join('')}
              </div>
              ${ev.notes ? `<div style="margin-top:16px;padding:12px;background:var(--cream);border-radius:3px;font-size:13px;color:var(--ink)">${ev.notes}</div>` : ''}
            </div>`;
        }).join('')}
    </div>`;
}

function renderEom(){
  const u = state.currentUser;
  const now = new Date();
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const currentEom = state.employeeOfMonth.find(e=>e.month===now.getMonth()+1 && e.year===now.getFullYear());
  const currentUser = currentEom ? getUserById(currentEom.user_id) : null;

  // Birthday check
  const today = now.toISOString().slice(5,10);
  const birthdays = state.users.filter(usr=>{
    if(!usr.birthday) return false;
    return usr.birthday.slice(5,10) === today;
  });
  const thisMonthBdays = state.users.filter(usr=>{
    if(!usr.birthday) return false;
    return usr.birthday.slice(5,7) === String(now.getMonth()+1).padStart(2,'0');
  }).sort((a,b)=>a.birthday.slice(8,10)-b.birthday.slice(8,10));

  return `
    ${currentEom && currentUser ? `
      <div class="eom-card">
        <div class="eom-crown">🏆</div>
        ${currentUser.avatar_url ? `<img src="${currentUser.avatar_url}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:4px solid rgba(245,240,232,.3);margin:0 auto 16px;display:block" alt="${currentUser.name}">` : `<div style="width:80px;height:80px;border-radius:50%;background:rgba(245,240,232,.12);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--paper);margin:0 auto 16px">${initials(currentUser.name)}</div>`}
        <div class="eom-name">${currentUser.name}</div>
        <div class="eom-dept">${currentUser.department||'SP Traduções'}</div>
        ${currentEom.reason ? `<div class="eom-reason">${currentEom.reason}</div>` : ''}
        <div class="eom-month">Destaque de ${months[now.getMonth()]} ${now.getFullYear()}</div>
      </div>` : `
      <div class="empty-state" style="margin-bottom:32px">
        <div class="empty-icon">🏆</div>
        <div class="empty-title">Nenhum destaque definido</div>
        <div class="empty-text">${u.role==='admin'?'Clique em Definir Destaque para escolher o colaborador do mês.':'O destaque do mês ainda não foi definido.'}</div>
      </div>`}
    
    <div class="section">
      <div class="section-header">
        <div class="section-title">🎂 Aniversariantes de ${months[now.getMonth()]}</div>
        <span class="section-count">${thisMonthBdays.length} pessoa${thisMonthBdays.length!==1?'s':''}</span>
      </div>
      ${thisMonthBdays.length===0 ? `<div class="empty-state"><div class="empty-icon">🎂</div><div class="empty-title">Nenhum aniversariante este mês</div><div class="empty-text">Os aniversários são preenchidos no cadastro de usuários.</div></div>` :
        thisMonthBdays.map(usr=>{
          const day = usr.birthday ? usr.birthday.slice(8,10) : '?';
          const isToday = usr.birthday && usr.birthday.slice(5,10)===today;
          return `<div class="bday-card ${isToday?'bday-today':''}">
            <div class="bday-icon">${isToday?'🎉':'🎂'}</div>
            <div class="avatar">${initials(usr.name)}</div>
            <div>
              <div class="bday-name">${usr.name}${isToday?' — Hoje! 🎊':''}</div>
              <div class="bday-date">Dia ${day} · ${usr.department||'—'}</div>
            </div>
          </div>`;
        }).join('')}
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Histórico</div>
      </div>
      ${state.employeeOfMonth.length===0 ? `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">Sem histórico</div></div>` :
        state.employeeOfMonth.map(e=>{
          const usr = getUserById(e.user_id);
          return `<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--cream)">
            <div class="avatar">${usr?initials(usr.name):'?'}</div>
            <div style="flex:1"><div style="font-size:13px;font-weight:600">${usr?usr.name:'?'}</div>
            <div style="font-size:11px;color:var(--muted)">${months[(e.month||1)-1]} ${e.year}</div></div>
            <div style="font-size:20px">🏆</div>
          </div>`;
        }).join('')}
    </div>`;
}

function renderEvalModal(){
  const f = state.evalForm;
  const u = state.currentUser;
  const targets = u.role==='admin' ? state.users.filter(x=>x.role==='employee') : state.users.filter(x=>x.role==='employee' && x.department===u.department);
  const criteria = ['Desempenho','Comunicação','Trabalho em Equipe','Pontualidade','Qualidade'];
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `
  <div class="modal-overlay" id="evalModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Nova Avaliação</div>
        <button class="modal-close" id="closeEvalModal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Colaborador</label>
            <select class="form-select" id="evalTo">
              <option value="">Selecione...</option>
              ${targets.map(t=>`<option value="${t.id}" ${f.toId===t.id?'selected':''}>${t.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Mês</label>
            <select class="form-select" id="evalMonth">
              ${months.map((m,i)=>`<option value="${i+1}" ${f.month===i+1?'selected':''}>${m}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notas (1 a 5 estrelas)</label>
          ${criteria.map(c=>`
            <div class="eval-row" style="margin-bottom:12px">
              <div class="eval-label">${c}</div>
              <div class="eval-stars">
                ${[1,2,3,4,5].map(n=>`<button class="eval-star ${(f.scores[c]||0)>=n?'active':''}" data-eval-crit="${c}" data-eval-score="${n}">★</button>`).join('')}
              </div>
            </div>`).join('')}
        </div>
        <div class="form-group">
          <label class="form-label">Observações (opcional)</label>
          <textarea class="form-textarea" id="evalNotes" placeholder="Comentários gerais sobre o desempenho...">${f.notes}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelEvalModal">Cancelar</button>
        <button class="btn btn-primary" id="submitEval" ${!f.toId?'disabled':''}>Registrar →</button>
      </div>
    </div>
  </div>`;
}

function bindApp(){
  document.querySelectorAll('[data-view]').forEach(el=>{
    el.onclick = ()=>{ state.view=el.dataset.view; state.typeFilter='all'; render(); };
  });
  document.getElementById('logoutBtn').onclick = ()=>{ state.currentUser=null; render(); };

  document.querySelectorAll('[data-filter]').forEach(el=>{
    el.onclick = ()=>{ state.typeFilter=el.dataset.filter; render(); };
  });

  const newFbBtn = document.getElementById('newFbBtn');
  if(newFbBtn) newFbBtn.onclick = ()=>{ state.showModal=true; render(); };

  const newUserBtn = document.getElementById('newUserBtn');
  if(newUserBtn) newUserBtn.onclick = ()=>{ state.showUserModal=true; render(); };

  document.querySelectorAll('[data-quick-fb]').forEach(el=>{
    el.onclick = ()=>{ state.form.toId=el.dataset.quickFb; state.showModal=true; render(); };
  });

  document.querySelectorAll('[data-delete-fb]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'feedback', id:el.dataset.deleteFb, name:el.dataset.deleteFbTitle }; render(); };
  });

  document.querySelectorAll('[data-delete-user]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'user', id:el.dataset.deleteUser, name:el.dataset.deleteUserName }; render(); };
  });

  if(state.confirm){
    document.getElementById('cancelConfirm').onclick = ()=>{ state.confirm=null; render(); };
    document.getElementById('confirmDelete').onclick = ()=>{
      if(state.confirm.type==='feedback') deleteFeedback(state.confirm.id);
      else if(state.confirm.type==='announcement') deleteAnnouncement(state.confirm.id);
      else if(state.confirm.type==='message') deleteMessage(state.confirm.id);
      else if(state.confirm.type==='poll') deletePoll(state.confirm.id);
      else if(state.confirm.type==='event') deleteEvent(state.confirm.id);
      else if(state.confirm.type==='personal_event') deletePersonalEvent(state.confirm.id);
      else deleteUser(state.confirm.id);
    };
  }

  if(state.showModal){
    document.getElementById('closeModal').onclick = ()=>{ state.showModal=false; render(); };
    document.getElementById('cancelModal').onclick = ()=>{ state.showModal=false; render(); };
    document.getElementById('modalOverlay').onclick = e=>{ if(e.target.id==='modalOverlay'){ state.showModal=false; render(); }};
    document.querySelectorAll('[data-type]').forEach(el=>{
      el.onclick = ()=>{ state.form.type=el.dataset.type; render(); };
    });
    const fbTo = document.getElementById('fbTo');
    if(fbTo) fbTo.onchange = e=>{ state.form.toId=e.target.value; render(); };
    const fbCat = document.getElementById('fbCat');
    if(fbCat) fbCat.onchange = e=>{ state.form.category=e.target.value; };
    const fbTitle = document.getElementById('fbTitle');
    if(fbTitle){ fbTitle.oninput = e=>{ state.form.title=e.target.value; document.getElementById('submitFb').disabled=!state.form.toId||!state.form.title||!state.form.content; }; }
    const fbContent = document.getElementById('fbContent');
    if(fbContent){ fbContent.oninput = e=>{ state.form.content=e.target.value; document.getElementById('submitFb').disabled=!state.form.toId||!state.form.title||!state.form.content; }; }
    document.getElementById('submitFb').onclick = submitFeedback;
  }






  // Bell notifications
  const bellBtn = document.getElementById('bellBtn');
  if(bellBtn) bellBtn.onclick = (e)=>{ e.stopPropagation(); state.showNotifDropdown=!state.showNotifDropdown; if(state.showNotifDropdown) markAllRead(); render(); };

  const clearNotifBtn = document.getElementById('clearNotifBtn');
  if(clearNotifBtn) clearNotifBtn.onclick = (e)=>{ e.stopPropagation(); clearNotifications(); };

  document.querySelectorAll('[data-notif-view]').forEach(el=>{
    el.onclick = ()=>{ state.view=el.dataset.notifView; state.showNotifDropdown=false; render(); };
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', function closeNotif(e){
    if(state.showNotifDropdown && !e.target.closest('.bell-wrap')){
      state.showNotifDropdown=false; render();
      document.removeEventListener('click', closeNotif);
    }
  });

  // Avatar upload
  const avatarInput = document.getElementById('avatarInput');
  if(avatarInput) avatarInput.onchange = e=>{ if(e.target.files[0]) uploadAvatar(e.target.files[0]); };



  // Personal events
  const newPersonalEventBtn = document.getElementById('newPersonalEventBtn');
  if(newPersonalEventBtn) newPersonalEventBtn.onclick = ()=>{ state.showPersonalEventModal=true; render(); };

  document.querySelectorAll('[data-delete-personal-event]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'personal_event', id:el.dataset.deletePersonalEvent, name:el.dataset.deletePersonalTitle }; render(); };
  });

  if(state.showPersonalEventModal){
    document.getElementById('closePersonalEventModal').onclick = ()=>{ state.showPersonalEventModal=false; render(); };
    document.getElementById('cancelPersonalEventModal').onclick = ()=>{ state.showPersonalEventModal=false; render(); };
    document.getElementById('personalEventModalOverlay').onclick = e=>{ if(e.target.id==='personalEventModalOverlay'){ state.showPersonalEventModal=false; render(); }};
    const peTitle = document.getElementById('personalEventTitle');
    if(peTitle) peTitle.oninput = e=>{ state.personalEventForm.title=e.target.value; document.getElementById('submitPersonalEvent').disabled=!state.personalEventForm.title||!state.personalEventForm.event_date; };
    const peDate = document.getElementById('personalEventDate');
    if(peDate) peDate.onchange = e=>{ state.personalEventForm.event_date=e.target.value; document.getElementById('submitPersonalEvent').disabled=!state.personalEventForm.title||!state.personalEventForm.event_date; };
    const peTime = document.getElementById('personalEventTime');
    if(peTime) peTime.onchange = e=>{ state.personalEventForm.event_time=e.target.value; };
    const peDesc = document.getElementById('personalEventDesc');
    if(peDesc) peDesc.oninput = e=>{ state.personalEventForm.description=e.target.value; };
    document.getElementById('submitPersonalEvent').onclick = submitPersonalEvent;
  }

  // Calendar
  const calPrev = document.getElementById('calPrev');
  if(calPrev) calPrev.onclick = ()=>{ state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} render(); };
  const calNext = document.getElementById('calNext');
  if(calNext) calNext.onclick = ()=>{ state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} render(); };

  const newEventBtn = document.getElementById('newEventBtn');
  if(newEventBtn) newEventBtn.onclick = ()=>{ state.showEventModal=true; render(); };

  document.querySelectorAll('[data-delete-event]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'event', id:el.dataset.deleteEvent, name:el.dataset.deleteEventTitle }; render(); };
  });

  if(state.showEventModal){
    document.getElementById('closeEventModal').onclick = ()=>{ state.showEventModal=false; render(); };
    document.getElementById('cancelEventModal').onclick = ()=>{ state.showEventModal=false; render(); };
    document.getElementById('eventModalOverlay').onclick = e=>{ if(e.target.id==='eventModalOverlay'){ state.showEventModal=false; render(); }};
    const evTitle = document.getElementById('eventTitle');
    if(evTitle) evTitle.oninput = e=>{ state.eventForm.title=e.target.value; document.getElementById('submitEvent').disabled=!state.eventForm.title||!state.eventForm.event_date; };
    const evDate = document.getElementById('eventDate');
    if(evDate) evDate.onchange = e=>{ state.eventForm.event_date=e.target.value; document.getElementById('submitEvent').disabled=!state.eventForm.title||!state.eventForm.event_date; };
    const evTime = document.getElementById('eventTime');
    if(evTime) evTime.onchange = e=>{ state.eventForm.event_time=e.target.value; };
    const evDesc = document.getElementById('eventDesc');
    if(evDesc) evDesc.oninput = e=>{ state.eventForm.description=e.target.value; };
    document.querySelectorAll('[data-eventcolor]').forEach(el=>{
      el.onclick = ()=>{ state.eventForm.color=el.dataset.eventcolor; render(); };
    });
    document.getElementById('submitEvent').onclick = submitEvent;
  }

  // Export PDF
  const exportPdfBtn = document.getElementById('exportPdfBtn');
  if(exportPdfBtn) exportPdfBtn.onclick = exportPDF;

  // Polls
  const newPollBtn = document.getElementById('newPollBtn');
  if(newPollBtn) newPollBtn.onclick = ()=>{ state.showPollModal=true; render(); };

  document.querySelectorAll('[data-vote-poll]').forEach(el=>{
    el.onclick = ()=>{ vote(el.dataset.votePoll, parseInt(el.dataset.voteOpt)); };
  });
  document.querySelectorAll('[data-close-poll]').forEach(el=>{
    el.onclick = ()=>{ closePoll(el.dataset.closePoll); };
  });

  if(state.showPollModal){
    document.getElementById('closePollModal').onclick = ()=>{ state.showPollModal=false; render(); };
    document.getElementById('cancelPollModal').onclick = ()=>{ state.showPollModal=false; render(); };
    document.getElementById('pollModalOverlay').onclick = e=>{ if(e.target.id==='pollModalOverlay'){ state.showPollModal=false; render(); }};
    document.getElementById('pollQuestion').oninput = e=>{ state.pollForm.question=e.target.value; document.getElementById('submitPoll').disabled=!state.pollForm.question||state.pollForm.options.filter(o=>o.trim()).length<2; };
    state.pollForm.options.forEach((_,i)=>{
      const el = document.getElementById('pollOpt'+i);
      if(el) el.oninput = e=>{ state.pollForm.options[i]=e.target.value; document.getElementById('submitPoll').disabled=!state.pollForm.question||state.pollForm.options.filter(o=>o.trim()).length<2; };
    });
    const addOpt = document.getElementById('addPollOpt');
    if(addOpt) addOpt.onclick = ()=>{ state.pollForm.options.push(''); render(); };
    document.getElementById('submitPoll').onclick = submitPoll;
  }

  // Evaluations
  const newEvalBtn = document.getElementById('newEvalBtn');
  if(newEvalBtn) newEvalBtn.onclick = ()=>{ state.showEvalModal=true; render(); };

  if(state.showEvalModal){
    document.getElementById('closeEvalModal').onclick = ()=>{ state.showEvalModal=false; render(); };
    document.getElementById('cancelEvalModal').onclick = ()=>{ state.showEvalModal=false; render(); };
    document.getElementById('evalModalOverlay').onclick = e=>{ if(e.target.id==='evalModalOverlay'){ state.showEvalModal=false; render(); }};
    const evalTo = document.getElementById('evalTo');
    if(evalTo) evalTo.onchange = e=>{ state.evalForm.toId=e.target.value; document.getElementById('submitEval').disabled=!state.evalForm.toId; render(); };
    const evalMonth = document.getElementById('evalMonth');
    if(evalMonth) evalMonth.onchange = e=>{ state.evalForm.month=parseInt(e.target.value); };
    const evalNotes = document.getElementById('evalNotes');
    if(evalNotes) evalNotes.oninput = e=>{ state.evalForm.notes=e.target.value; };
    document.querySelectorAll('[data-eval-crit]').forEach(el=>{
      el.onclick = ()=>{ state.evalForm.scores[el.dataset.evalCrit]=parseInt(el.dataset.evalScore); render(); };
    });
    document.getElementById('submitEval').onclick = submitEvaluation;
  }

  // EOM
  const newEomBtn = document.getElementById('newEomBtn');
  if(newEomBtn) newEomBtn.onclick = ()=>{ state.showEomModal=true; render(); };

  if(state.showEomModal){
    document.getElementById('closeEomModal').onclick = ()=>{ state.showEomModal=false; render(); };
    document.getElementById('cancelEomModal').onclick = ()=>{ state.showEomModal=false; render(); };
    document.getElementById('eomModalOverlay').onclick = e=>{ if(e.target.id==='eomModalOverlay'){ state.showEomModal=false; render(); }};
    const eomUser = document.getElementById('eomUser');
    if(eomUser) eomUser.onchange = e=>{ state.eomForm.userId=e.target.value; document.getElementById('submitEom').disabled=!state.eomForm.userId; render(); };
    const eomReason = document.getElementById('eomReason');
    if(eomReason) eomReason.oninput = e=>{ state.eomForm.reason=e.target.value; };
    document.getElementById('submitEom').onclick = submitEom;
  }


  document.querySelectorAll('[data-delete-msg]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'message', id:el.dataset.deleteMsg, name:el.dataset.deleteMsgTitle }; render(); };
  });
  document.querySelectorAll('[data-delete-poll]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'poll', id:el.dataset.deletePoll, name:el.dataset.deletePollTitle }; render(); };
  });

  // Announcements
  const newAnnBtn = document.getElementById('newAnnBtn');
  if(newAnnBtn) newAnnBtn.onclick = ()=>{ state.showAnnModal=true; render(); };

  document.querySelectorAll('[data-delete-ann]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'announcement', id:el.dataset.deleteAnn, name:el.dataset.deleteAnnTitle }; render(); };
  });

  if(state.showAnnModal){
    document.getElementById('closeAnnModal').onclick = ()=>{ state.showAnnModal=false; render(); };
    document.getElementById('cancelAnnModal').onclick = ()=>{ state.showAnnModal=false; render(); };
    document.getElementById('annModalOverlay').onclick = e=>{ if(e.target.id==='annModalOverlay'){ state.showAnnModal=false; render(); }};
    document.querySelectorAll('[data-annpriority]').forEach(el=>{
      el.onclick = ()=>{ state.annForm.priority=el.dataset.annpriority; render(); };
    });
    const annTitle = document.getElementById('annTitle');
    if(annTitle){ annTitle.oninput = e=>{ state.annForm.title=e.target.value; document.getElementById('submitAnn').disabled=!state.annForm.title||!state.annForm.content; }; }
    const annContent = document.getElementById('annContent');
    if(annContent){ annContent.oninput = e=>{ state.annForm.content=e.target.value; document.getElementById('submitAnn').disabled=!state.annForm.title||!state.annForm.content; }; }
    document.getElementById('submitAnn').onclick = submitAnnouncement;
  }

  // Messages
  const newMsgBtn = document.getElementById('newMsgBtn');
  if(newMsgBtn) newMsgBtn.onclick = ()=>{ state.showMsgModal=true; render(); };

  if(state.showMsgModal){
    document.getElementById('closeMsgModal').onclick = ()=>{ state.showMsgModal=false; render(); };
    document.getElementById('cancelMsgModal').onclick = ()=>{ state.showMsgModal=false; render(); };
    document.getElementById('msgModalOverlay').onclick = e=>{ if(e.target.id==='msgModalOverlay'){ state.showMsgModal=false; render(); }};
    document.querySelectorAll('[data-msgtype]').forEach(el=>{
      el.onclick = ()=>{ state.msgForm.type=el.dataset.msgtype; render(); };
    });
    const msgTitle = document.getElementById('msgTitle');
    if(msgTitle){ msgTitle.oninput = e=>{ state.msgForm.title=e.target.value; document.getElementById('submitMsg').disabled=!state.msgForm.title||!state.msgForm.content; }; }
    const msgContent = document.getElementById('msgContent');
    if(msgContent){ msgContent.oninput = e=>{ state.msgForm.content=e.target.value; document.getElementById('submitMsg').disabled=!state.msgForm.title||!state.msgForm.content; }; }
    document.getElementById('submitMsg').onclick = submitMessage;
  }

  // Reply buttons
  document.querySelectorAll('[data-reply]').forEach(el=>{
    el.onclick = ()=>{ state.replyingId=el.dataset.reply; state.replyText=''; render(); };
  });
  document.querySelectorAll('[data-cancel-reply]').forEach(el=>{
    el.onclick = ()=>{ state.replyingId=null; state.replyText=''; render(); };
  });
  document.querySelectorAll('[data-submit-reply]').forEach(el=>{
    el.onclick = ()=>{ submitReply(el.dataset.submitReply); };
  });
  document.querySelectorAll('[id^="replyInput_"]').forEach(el=>{
    el.oninput = e=>{ state.replyText=e.target.value; };
  });

  if(state.showUserModal){
    document.getElementById('closeUserModal').onclick = ()=>{ state.showUserModal=false; render(); };
    document.getElementById('cancelUserModal').onclick = ()=>{ state.showUserModal=false; render(); };
    document.getElementById('userModalOverlay').onclick = e=>{ if(e.target.id==='userModalOverlay'){ state.showUserModal=false; render(); }};
    document.getElementById('uName').oninput = e=>state.userForm.name=e.target.value;
    document.getElementById('uEmail').oninput = e=>state.userForm.email=e.target.value;
    document.getElementById('uPass').oninput = e=>state.userForm.password=e.target.value;
    document.getElementById('uDept').onchange = e=>state.userForm.department=e.target.value;
    document.getElementById('uRole').onchange = e=>state.userForm.role=e.target.value;
    document.getElementById('submitUser').onclick = submitUser;
  }
}

function svgIcon(n){
  const s='stroke="currentColor" stroke-width="1.5" fill="none"';
  const icons={
    dash:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
    fb:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
    ppl:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>`,
    usr:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,
