  if(changePasswordBtn) changePasswordBtn.onclick = ()=>{ state.showPasswordModal=true; state.passwordError=''; render(); };

  if(state.showPasswordModal){
    document.getElementById('closePasswordModal').onclick = ()=>{ state.showPasswordModal=false; state.passwordError=''; render(); };
    document.getElementById('cancelPasswordModal').onclick = ()=>{ state.showPasswordModal=false; state.passwordError=''; render(); };
    document.getElementById('passwordModalOverlay').onclick = e=>{ if(e.target.id==='passwordModalOverlay'){ state.showPasswordModal=false; render(); }};
    const cp = document.getElementById('currentPassword');
    if(cp) cp.oninput = e=>{ state.passwordForm.current=e.target.value; document.getElementById('submitPassword').disabled=!state.passwordForm.current||!state.passwordForm.new1||!state.passwordForm.new2; };
    const np1 = document.getElementById('newPassword1');
    if(np1) np1.oninput = e=>{ state.passwordForm.new1=e.target.value; document.getElementById('submitPassword').disabled=!state.passwordForm.current||!state.passwordForm.new1||!state.passwordForm.new2; };
    const np2 = document.getElementById('newPassword2');
    if(np2) np2.oninput = e=>{ state.passwordForm.new2=e.target.value; document.getElementById('submitPassword').disabled=!state.passwordForm.current||!state.passwordForm.new1||!state.passwordForm.new2; };
    document.getElementById('submitPassword').onclick = submitChangePassword;
  }


  // Edit user
  document.querySelectorAll('[data-edit-user]').forEach(el=>{
    el.onclick = ()=>{
      state.editUserForm = {
        id: el.dataset.editUser,
        name: el.dataset.editUserName,
        email: el.dataset.editUserEmail,
        role: el.dataset.editUserRole,
        department: el.dataset.editUserDept,
        password: ''
      };
      state.showEditUserModal = true;
      render();
    };
  });

  if(state.showEditUserModal){
    document.getElementById('closeEditUserModal').onclick = ()=>{ state.showEditUserModal=false; render(); };
    document.getElementById('cancelEditUserModal').onclick = ()=>{ state.showEditUserModal=false; render(); };
    document.getElementById('editUserModalOverlay').onclick = e=>{ if(e.target.id==='editUserModalOverlay'){ state.showEditUserModal=false; render(); }};
    const euName = document.getElementById('editUName');
    if(euName) euName.oninput = e=>state.editUserForm.name=e.target.value;
    const euEmail = document.getElementById('editUEmail');
    if(euEmail) euEmail.oninput = e=>state.editUserForm.email=e.target.value;
    const euRole = document.getElementById('editURole');
    if(euRole) euRole.onchange = e=>{ state.editUserForm.role=e.target.value; render(); };
    const euDept = document.getElementById('editUDept');
    if(euDept) euDept.onchange = e=>state.editUserForm.department=e.target.value;
    const euPass = document.getElementById('editUPass');
    if(euPass) euPass.oninput = e=>state.editUserForm.password=e.target.value;
    document.getElementById('submitEditUser').onclick = submitEditUser;
  }

  // Birthday modal
  document.querySelectorAll('[data-edit-birthday]').forEach(el=>{
    el.onclick = ()=>{
      state.birthdayForm = { userId: el.dataset.editBirthday, name: el.dataset.editBirthdayName, birthday: el.dataset.editBirthdayVal };
      state.showBirthdayModal = true;
      render();
    };
  });

  if(state.showBirthdayModal){
    document.getElementById('closeBirthdayModal').onclick = ()=>{ state.showBirthdayModal=false; render(); };
    document.getElementById('cancelBirthdayModal').onclick = ()=>{ state.showBirthdayModal=false; render(); };
    document.getElementById('birthdayModalOverlay').onclick = e=>{ if(e.target.id==='birthdayModalOverlay'){ state.showBirthdayModal=false; render(); }};
    const bdInput = document.getElementById('birthdayInput');
    if(bdInput) bdInput.onchange = e=>{ state.birthdayForm.birthday=e.target.value; };
    document.getElementById('submitBirthday').onclick = submitBirthday;
  }

  // Personal events
  const newPersonalEventBtn = document.getElementById('newPersonalEventBtn');
  if(newPersonalEventBtn) newPersonalEventBtn.onclick = ()=>{ state.showPersonalEventModal=true; render(); };

  document.querySelectorAll('[data-delete-personal-event]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'personal_event', id:el.dataset.deletePersonalEvent, name:el.dataset.deletePersonalTitle }; render(); };
  });

  if(state.showPersonalEventModal){
    document.getElementById('closePersonalEventModal').onclick = ()=>{ state.showPersonalEventModal=false; render(); };
    document.getElementById('cancelPersonalEventModal').onclick = ()=>{ state.showPersonalEventModal=false; render(); };
    document.getElementById('personalEventModalOverlay').onclick = e=>{ if(e.target.id==='personalEventModalOverlay'){ state.showPersonalEventModal=false; render(); }};
    const peTitle = document.getElementById('personalEventTitle');
    if(peTitle) peTitle.oninput = e=>{ state.personalEventForm.title=e.target.value; document.getElementById('submitPersonalEvent').disabled=!state.personalEventForm.title||!state.personalEventForm.event_date; };
    const peDate = document.getElementById('personalEventDate');
    if(peDate) peDate.onchange = e=>{ state.personalEventForm.event_date=e.target.value; document.getElementById('submitPersonalEvent').disabled=!state.personalEventForm.title||!state.personalEventForm.event_date; };
    const peTime = document.getElementById('personalEventTime');
    if(peTime) peTime.onchange = e=>{ state.personalEventForm.event_time=e.target.value; };
    const peDesc = document.getElementById('personalEventDesc');
    if(peDesc) peDesc.oninput = e=>{ state.personalEventForm.description=e.target.value; };
    document.getElementById('submitPersonalEvent').onclick = submitPersonalEvent;
  }

  // Calendar
  const calPrev = document.getElementById('calPrev');
  if(calPrev) calPrev.onclick = ()=>{ state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} render(); };
  const calNext = document.getElementById('calNext');
  if(calNext) calNext.onclick = ()=>{ state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} render(); };

  const newEventBtn = document.getElementById('newEventBtn');
  if(newEventBtn) newEventBtn.onclick = ()=>{ state.showEventModal=true; render(); };

  document.querySelectorAll('[data-delete-event]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'event', id:el.dataset.deleteEvent, name:el.dataset.deleteEventTitle }; render(); };
  });

  if(state.showEventModal){
    document.getElementById('closeEventModal').onclick = ()=>{ state.showEventModal=false; render(); };
    document.getElementById('cancelEventModal').onclick = ()=>{ state.showEventModal=false; render(); };
    document.getElementById('eventModalOverlay').onclick = e=>{ if(e.target.id==='eventModalOverlay'){ state.showEventModal=false; render(); }};
    const evTitle = document.getElementById('eventTitle');
    if(evTitle) evTitle.oninput = e=>{ state.eventForm.title=e.target.value; document.getElementById('submitEvent').disabled=!state.eventForm.title||!state.eventForm.event_date; };
    const evDate = document.getElementById('eventDate');
    if(evDate) evDate.onchange = e=>{ state.eventForm.event_date=e.target.value; document.getElementById('submitEvent').disabled=!state.eventForm.title||!state.eventForm.event_date; };
    const evTime = document.getElementById('eventTime');
    if(evTime) evTime.onchange = e=>{ state.eventForm.event_time=e.target.value; };
    const evDesc = document.getElementById('eventDesc');
    if(evDesc) evDesc.oninput = e=>{ state.eventForm.description=e.target.value; };
    document.querySelectorAll('[data-eventcolor]').forEach(el=>{
      el.onclick = ()=>{ state.eventForm.color=el.dataset.eventcolor; render(); };
    });
    document.getElementById('submitEvent').onclick = submitEvent;
  }

  // Export PDF
  const exportPdfBtn = document.getElementById('exportPdfBtn');
  if(exportPdfBtn) exportPdfBtn.onclick = exportPDF;

  // Polls
  const newPollBtn = document.getElementById('newPollBtn');
  if(newPollBtn) newPollBtn.onclick = ()=>{ state.showPollModal=true; render(); };

  document.querySelectorAll('[data-vote-poll]').forEach(el=>{
    el.onclick = ()=>{ vote(el.dataset.votePoll, parseInt(el.dataset.voteOpt)); };
  });
  document.querySelectorAll('[data-close-poll]').forEach(el=>{
    el.onclick = ()=>{ closePoll(el.dataset.closePoll); };
  });

  if(state.showPollModal){
    document.getElementById('closePollModal').onclick = ()=>{ state.showPollModal=false; render(); };
    document.getElementById('cancelPollModal').onclick = ()=>{ state.showPollModal=false; render(); };
    document.getElementById('pollModalOverlay').onclick = e=>{ if(e.target.id==='pollModalOverlay'){ state.showPollModal=false; render(); }};
    document.getElementById('pollQuestion').oninput = e=>{ state.pollForm.question=e.target.value; document.getElementById('submitPoll').disabled=!state.pollForm.question||state.pollForm.options.filter(o=>o.trim()).length<2; };
    state.pollForm.options.forEach((_,i)=>{
      const el = document.getElementById('pollOpt'+i);
      if(el) el.oninput = e=>{ state.pollForm.options[i]=e.target.value; document.getElementById('submitPoll').disabled=!state.pollForm.question||state.pollForm.options.filter(o=>o.trim()).length<2; };
    });
    const addOpt = document.getElementById('addPollOpt');
    if(addOpt) addOpt.onclick = ()=>{ state.pollForm.options.push(''); render(); };
    document.getElementById('submitPoll').onclick = submitPoll;
  }

  // Evaluations
  const newEvalBtn = document.getElementById('newEvalBtn');
  if(newEvalBtn) newEvalBtn.onclick = ()=>{ state.showEvalModal=true; render(); };

  if(state.showEvalModal){
    document.getElementById('closeEvalModal').onclick = ()=>{ state.showEvalModal=false; render(); };
    document.getElementById('cancelEvalModal').onclick = ()=>{ state.showEvalModal=false; render(); };
    document.getElementById('evalModalOverlay').onclick = e=>{ if(e.target.id==='evalModalOverlay'){ state.showEvalModal=false; render(); }};
    const evalTo = document.getElementById('evalTo');
    if(evalTo) evalTo.onchange = e=>{ state.evalForm.toId=e.target.value; document.getElementById('submitEval').disabled=!state.evalForm.toId; render(); };
    const evalMonth = document.getElementById('evalMonth');
    if(evalMonth) evalMonth.onchange = e=>{ state.evalForm.month=parseInt(e.target.value); };
    const evalNotes = document.getElementById('evalNotes');
    if(evalNotes) evalNotes.oninput = e=>{ state.evalForm.notes=e.target.value; };
    document.querySelectorAll('[data-eval-crit]').forEach(el=>{
      el.onclick = ()=>{ state.evalForm.scores[el.dataset.evalCrit]=parseInt(el.dataset.evalScore); render(); };
    });
    document.getElementById('submitEval').onclick = submitEvaluation;
  }

  // EOM
  const newEomBtn = document.getElementById('newEomBtn');
  if(newEomBtn) newEomBtn.onclick = ()=>{ state.showEomModal=true; render(); };

  if(state.showEomModal){
    document.getElementById('closeEomModal').onclick = ()=>{ state.showEomModal=false; render(); };
    document.getElementById('cancelEomModal').onclick = ()=>{ state.showEomModal=false; render(); };
    document.getElementById('eomModalOverlay').onclick = e=>{ if(e.target.id==='eomModalOverlay'){ state.showEomModal=false; render(); }};
    const eomUser = document.getElementById('eomUser');
    if(eomUser) eomUser.onchange = e=>{ state.eomForm.userId=e.target.value; document.getElementById('submitEom').disabled=!state.eomForm.userId; render(); };
    const eomReason = document.getElementById('eomReason');
    if(eomReason) eomReason.oninput = e=>{ state.eomForm.reason=e.target.value; };
    document.getElementById('submitEom').onclick = submitEom;
  }


  document.querySelectorAll('[data-delete-msg]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'message', id:el.dataset.deleteMsg, name:el.dataset.deleteMsgTitle }; render(); };
  });
  document.querySelectorAll('[data-delete-poll]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'poll', id:el.dataset.deletePoll, name:el.dataset.deletePollTitle }; render(); };
  });

  // Announcements
  const newAnnBtn = document.getElementById('newAnnBtn');
  if(newAnnBtn) newAnnBtn.onclick = ()=>{ state.showAnnModal=true; render(); };

  document.querySelectorAll('[data-delete-ann]').forEach(el=>{
    el.onclick = ()=>{ state.confirm = { type:'announcement', id:el.dataset.deleteAnn, name:el.dataset.deleteAnnTitle }; render(); };
  });

  if(state.showAnnModal){
    document.getElementById('closeAnnModal').onclick = ()=>{ state.showAnnModal=false; render(); };
    document.getElementById('cancelAnnModal').onclick = ()=>{ state.showAnnModal=false; render(); };
    document.getElementById('annModalOverlay').onclick = e=>{ if(e.target.id==='annModalOverlay'){ state.showAnnModal=false; render(); }};
    document.querySelectorAll('[data-annpriority]').forEach(el=>{
      el.onclick = ()=>{ state.annForm.priority=el.dataset.annpriority; render(); };
    });
    const annTitle = document.getElementById('annTitle');
    if(annTitle){ annTitle.oninput = e=>{ state.annForm.title=e.target.value; document.getElementById('submitAnn').disabled=!state.annForm.title||!state.annForm.content; }; }
    const annContent = document.getElementById('annContent');
    if(annContent){ annContent.oninput = e=>{ state.annForm.content=e.target.value; document.getElementById('submitAnn').disabled=!state.annForm.title||!state.annForm.content; }; }
    document.getElementById('submitAnn').onclick = submitAnnouncement;
  }

  // Messages
  const newMsgBtn = document.getElementById('newMsgBtn');
  if(newMsgBtn) newMsgBtn.onclick = ()=>{ state.showMsgModal=true; render(); };

  if(state.showMsgModal){
    document.getElementById('closeMsgModal').onclick = ()=>{ state.showMsgModal=false; render(); };
    document.getElementById('cancelMsgModal').onclick = ()=>{ state.showMsgModal=false; render(); };
    document.getElementById('msgModalOverlay').onclick = e=>{ if(e.target.id==='msgModalOverlay'){ state.showMsgModal=false; render(); }};
    document.querySelectorAll('[data-msgtype]').forEach(el=>{
      el.onclick = ()=>{ state.msgForm.type=el.dataset.msgtype; render(); };
    });
    const msgTitle = document.getElementById('msgTitle');
    if(msgTitle){ msgTitle.oninput = e=>{ state.msgForm.title=e.target.value; document.getElementById('submitMsg').disabled=!state.msgForm.title||!state.msgForm.content; }; }
    const msgContent = document.getElementById('msgContent');
    if(msgContent){ msgContent.oninput = e=>{ state.msgForm.content=e.target.value; document.getElementById('submitMsg').disabled=!state.msgForm.title||!state.msgForm.content; }; }
    document.getElementById('submitMsg').onclick = submitMessage;
  }

  // Reply buttons
  document.querySelectorAll('[data-reply]').forEach(el=>{
    el.onclick = ()=>{ state.replyingId=el.dataset.reply; state.replyText=''; render(); };
  });
  document.querySelectorAll('[data-cancel-reply]').forEach(el=>{
    el.onclick = ()=>{ state.replyingId=null; state.replyText=''; render(); };
  });
  document.querySelectorAll('[data-submit-reply]').forEach(el=>{
    el.onclick = ()=>{ submitReply(el.dataset.submitReply); };
  });
  document.querySelectorAll('[id^="replyInput_"]').forEach(el=>{
    el.oninput = e=>{ state.replyText=e.target.value; };
  });

  if(state.showUserModal){
    document.getElementById('closeUserModal').onclick = ()=>{ state.showUserModal=false; render(); };
    document.getElementById('cancelUserModal').onclick = ()=>{ state.showUserModal=false; render(); };
    document.getElementById('userModalOverlay').onclick = e=>{ if(e.target.id==='userModalOverlay'){ state.showUserModal=false; render(); }};
    document.getElementById('uName').oninput = e=>state.userForm.name=e.target.value;
    document.getElementById('uEmail').oninput = e=>state.userForm.email=e.target.value;
    document.getElementById('uPass').oninput = e=>state.userForm.password=e.target.value;
    document.getElementById('uDept').onchange = e=>state.userForm.department=e.target.value;
    document.getElementById('uRole').onchange = e=>state.userForm.role=e.target.value;
    const uBirthday = document.getElementById('uBirthday');
    if(uBirthday) uBirthday.onchange = e=>state.userForm.birthday=e.target.value;
    document.getElementById('submitUser').onclick = submitUser;
  }
}

function svgIcon(n){
  const s='stroke="currentColor" stroke-width="1.5" fill="none"';
  const icons={
    dash:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
    fb:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
    ppl:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>`,
    usr:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,
    my:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,
    add:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
    logout:`<svg width="13" height="13" viewBox="0 0 24 24" ${s}><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
    msg:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
    ai:`<svg width="15" height="15" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none" opacity="0.3"/></svg>`,
    clock:`<svg width="15" height="15" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    bell:`<svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`,
    cal:`<svg width="15" height="15" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    poll:`<svg width="15" height="15" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
    eval:`<svg width="15" height="15" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    star:`<svg width="15" height="15" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    ann:`<svg width="15" height="15" viewBox="0 0 24 24" ${s}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="13" y2="14"/></svg>`,
  };
  return icons[n]||'';
}

// Auto-restore session
(async () => {
  const restored = await restoreSession();
  if(restored){
    requestNotificationPermission();
    startNotifPolling();
    startRealtime();
  }
  render();
})();
</script>
