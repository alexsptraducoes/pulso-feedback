<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOW - SP Traduções</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0d;  --blue:#11008d;--paper:#f5f0e8;--cream:#ede8dc;--sand:#d9d2c0;
  --positive:#2d6a4f;--positive-bg:#d8f3dc;
  --constructive:#c44b2b;--constructive-bg:#fde8e3;
  --accent:#11008d;--muted:#7a7166;--border:#e0d9cc;--white:#ffffff;
  --shadow:0 4px 24px rgba(13,13,13,0.07);
  --shadow-md:0 8px 32px rgba(13,13,13,0.10);
  --shadow-lg:0 16px 48px rgba(13,13,13,0.14);
  --radius:10px;--radius-sm:6px;--radius-lg:16px;
}
body{font-family:'DM Sans',sans-serif;background:#ede8dc;color:var(--ink);min-height:100vh}

/* LOGIN */
.login-screen{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0a0060 0%,#13029e 50%,#1704ad 100%);
  background-image:radial-gradient(ellipse at 20% 80%,rgba(255,255,255,.08) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 20%,rgba(255,255,255,.05) 0%,transparent 60%)}
.login-card{background:var(--paper);border-radius:var(--radius-lg);padding:52px;width:440px;box-shadow:0 24px 64px rgba(13,13,13,0.18);border:1px solid rgba(255,255,255,.6)}
.login-logo{font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:var(--ink)}
.login-subtitle{font-size:12px;color:var(--muted);margin-bottom:44px;letter-spacing:.06em;text-transform:uppercase;margin-top:6px}
.login-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px}
.login-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);margin-bottom:18px;transition:border-color .15s}
.login-input:focus{outline:none;border-color:var(--ink)}
.login-btn{width:100%;padding:15px;background:#e65c38;color:var(--paper);border:none;border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:all .2s;margin-top:4px}
.login-btn:hover{background:#c94a28}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{font-size:12px;color:var(--constructive);margin-bottom:12px;padding:10px 14px;background:var(--constructive-bg);border-radius:3px}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#13029e 0%,#0a0060 100%);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;box-shadow:4px 0 24px rgba(0,0,0,0.15)}
.sidebar-brand{padding:28px 24px 22px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-logo{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--paper)}
.sidebar-tagline{font-size:10px;color:rgba(245,240,232,.35);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.sidebar-user{padding:18px 24px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-user-name{font-size:13px;font-weight:600;color:var(--paper)}
.sidebar-user-role{font-size:11px;color:rgba(245,240,232,.38);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-section{font-size:9px;font-weight:700;color:rgba(245,240,232,.22);text-transform:uppercase;letter-spacing:.12em;padding:0 12px;margin:20px 0 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;
  color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;font-weight:400;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{color:var(--paper);background:rgba(255,255,255,.05)}
.nav-item.active{color:var(--paper);background:rgba(255,255,255,.18);font-weight:500;border-left:3px solid rgba(255,255,255,.8)}
.sidebar-logout{padding:16px 24px;border-top:1px solid rgba(255,255,255,.06);font-size:12px;
  color:rgba(245,240,232,.32);cursor:pointer;transition:color .15s;display:flex;align-items:center;gap:8px;
  background:none;border-left:none;border-right:none;border-bottom:none;width:100%;text-align:left}
.sidebar-logout:hover{color:var(--paper)}
.main{margin-left:260px;flex:1;min-height:100vh}
.topbar{padding:20px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;background:rgba(245,240,232,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--ink)}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:2px}
.content{padding:32px 40px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:40px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);transition:box-shadow .2s}
.stat-card.dark{background:linear-gradient(135deg,#0a0060 0%,#13029e 100%)}
.stat-number{font-family:'Fraunces',serif;font-size:38px;font-weight:700;color:var(--ink)}
.stat-card.dark .stat-number{color:var(--paper)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:6px}
.stat-card.dark .stat-label{color:rgba(245,240,232,.4)}

/* RANKING */
.ranking-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:40px}
.ranking-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.ranking-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#0a0060 0%,#13029e 100%);border-radius:var(--radius) var(--radius) 0 0}
.ranking-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:#ffffff}
.ranking-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--cream)}
.ranking-item:last-child{border-bottom:none}
.ranking-pos{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--muted);width:24px;text-align:center}
.ranking-pos.gold{color:#c9a84c}
.ranking-pos.silver{color:#888}
.ranking-pos.bronze{color:#a06b3c}
.ranking-name{flex:1;font-size:13px;font-weight:500}
.ranking-dept{font-size:11px;color:var(--muted)}
.ranking-count{font-family:'Fraunces',serif;font-size:22px;font-weight:700}
.ranking-count.pos{color:var(--positive)}
.ranking-count.con{color:var(--constructive)}

/* SECTION */
.section{margin-bottom:40px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--ink)}
.section-count{font-size:12px;color:var(--muted);background:var(--cream);padding:3px 10px;border-radius:20px}

/* TEAM BADGE */
.team-badge{display:inline-block;padding:3px 10px;border-radius:2px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;background:var(--cream);color:var(--muted)}

/* FEEDBACK CARDS */
.feedback-list{display:flex;flex-direction:column;gap:12px}
.feedback-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;
  border-left:4px solid transparent;transition:all .2s;box-shadow:var(--shadow)}
.feedback-card.positive{border-left-color:var(--positive)}
.feedback-card.constructive{border-left-color:var(--constructive)}
.feedback-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.feedback-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.feedback-meta{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;background:var(--sand);color:var(--ink);flex-shrink:0}
.feedback-from{font-size:13px;font-weight:500;color:var(--ink)}
.feedback-to{font-size:11px;color:var(--muted)}
.feedback-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.badge-positive{background:var(--positive-bg);color:var(--positive)}
.badge-constructive{background:var(--constructive-bg);color:var(--constructive)}
.badge-category{background:var(--cream);color:var(--muted)}
.feedback-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--ink);margin-bottom:8px}
.feedback-content{font-size:13px;color:#3d3830;line-height:1.65}
.feedback-date{font-size:11px;color:var(--muted);margin-top:12px;padding-top:12px;border-top:1px solid var(--cream)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:#e65c38;color:var(--paper)}
.btn-primary:hover{background:#c94a28}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:var(--cream);color:var(--ink);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--sand)}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:var(--radius-sm)}
.btn-danger{background:#fde8e3;color:var(--constructive);border:1px solid #f5c6bb}
.btn-danger:hover{background:var(--constructive);color:white}
.confirm-overlay{position:fixed;inset:0;background:rgba(13,13,13,.55);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.confirm-box{background:var(--paper);border-radius:var(--radius-lg);padding:32px;width:380px;box-shadow:var(--shadow-lg);text-align:center;border:1px solid var(--border)}
.confirm-title{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:10px}
.confirm-text{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.confirm-actions{display:flex;gap:10px;justify-content:center}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(13,13,13,.55);z-index:200;display:flex;
  align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(3px)}
.modal{background:var(--paper);border-radius:var(--radius-lg);width:100%;max-width:580px;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto;border:1px solid rgba(255,255,255,.5)}
.modal-header{padding:28px 32px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Fraunces',serif;font-size:22px;font-weight:600}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:4px;line-height:1}
.modal-body{padding:24px 32px 0}
.modal-footer{padding:20px 32px 32px;display:flex;gap:10px;justify-content:flex-end}
.form-group{margin-bottom:20px}
.form-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);transition:border-color .15s;resize:vertical}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--ink)}
.form-textarea{min-height:100px;line-height:1.55}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.type-toggle{display:flex;gap:8px}
.type-btn{flex:1;padding:11px;border-radius:3px;border:1.5px solid var(--border);background:var(--white);
  font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;font-family:'DM Sans',sans-serif}
.type-btn.sel-positive{border-color:var(--positive);background:var(--positive-bg);color:var(--positive)}
.type-btn.sel-constructive{border-color:var(--constructive);background:var(--constructive-bg);color:var(--constructive)}

/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;
  transition:all .15s;border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-family:'DM Sans',sans-serif}
.filter-btn.active{background:#e65c38;color:var(--paper);border-color:#e65c38;box-shadow:0 2px 8px rgba(230,92,56,.25)}

/* EMPTY */
.empty-state{padding:60px 40px;text-align:center;background:var(--white);border:1px dashed var(--border);border-radius:4px}
.empty-icon{font-size:36px;margin-bottom:16px;opacity:.35}
.empty-title{font-family:'Fraunces',serif;font-size:18px;color:var(--ink);margin-bottom:8px}
.empty-text{font-size:13px;color:var(--muted)}

/* PEOPLE */
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.person-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);transition:all .2s}
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px}
.person-avatar{width:50px;height:50px;border-radius:50%;background:var(--sand);display:flex;align-items:center;
  justify-content:center;font-size:15px;font-weight:700;color:var(--ink)}
.person-name{font-size:14px;font-weight:600;color:var(--ink)}
.person-dept{font-size:11px;color:var(--muted)}
.person-counts{font-size:12px;color:var(--muted);margin-top:2px}

/* MY HERO */
.my-hero{background:linear-gradient(135deg,#0a0060 0%,#13029e 100%);border-radius:var(--radius-lg);padding:32px;margin-bottom:32px;display:flex;align-items:center;gap:20px;box-shadow:var(--shadow-md)}
.my-hero-avatar{width:58px;height:58px;border-radius:50%;background:rgba(245,240,232,.12);display:flex;
  align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--paper);flex-shrink:0}
.my-hero-name{font-family:'Fraunces',serif;font-size:20px;color:var(--paper);font-weight:600}
.my-hero-sub{font-size:12px;color:rgba(245,240,232,.4);margin-top:3px}
.my-hero-stats{margin-left:auto;display:flex;gap:32px}
.my-stat{text-align:center}
.my-stat-num{font-family:'Fraunces',serif;font-size:30px;font-weight:700}
.my-stat-num.pos{color:#6fcf97}
.my-stat-num.con{color:#eb8b77}
.my-stat-num.tot{color:var(--paper)}
.my-stat-label{font-size:10px;color:rgba(245,240,232,.38);text-transform:uppercase;letter-spacing:.08em}

/* USERS ADMIN */
.users-table{width:100%;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.users-table table{width:100%;border-collapse:collapse}
.users-table th{padding:12px 18px;text-align:left;font-size:10px;font-weight:700;color:#ffffff;
  text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);background:#11008d}
.users-table td{padding:14px 18px;font-size:13px;border-bottom:1px solid var(--cream);color:var(--ink)}
.users-table tr:last-child td{border-bottom:none}
.role-pill{display:inline-block;padding:3px 10px;border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.role-admin{background:var(--ink);color:var(--paper)}
.role-leader{background:var(--accent);color:white}
.role-manager{background:#11008d;color:white}
.role-employee{background:var(--sand);color:var(--ink)}

/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#11008d;color:var(--paper);padding:14px 22px;
  border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:999;box-shadow:var(--shadow-lg);
  animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* MESSAGES */
.msg-list{display:flex;flex-direction:column;gap:12px}
.msg-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;transition:all .2s;box-shadow:var(--shadow)}
.msg-card:hover{box-shadow:var(--shadow)}
.msg-card.unread{border-left:3px solid var(--accent)}
.msg-type-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.msg-elogio{background:#d8f3dc;color:#2d6a4f}
.msg-critica{background:#fde8e3;color:#c44b2b}
.msg-reclamacao{background:#fff3cd;color:#856404}
.msg-sugestao{background:#d0e8ff;color:#0a58ca}
.msg-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--ink);margin:10px 0 6px}
.msg-content{font-size:13px;color:#3d3830;line-height:1.65}
.msg-from{font-size:12px;color:var(--muted);margin-top:10px}
.msg-reply-box{margin-top:16px;padding:14px;background:var(--cream);border-radius:3px;border-left:3px solid var(--accent)}
.msg-reply-label{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.msg-reply-text{font-size:13px;color:var(--ink);line-height:1.6}
.msg-reply-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:3px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--white);resize:vertical;min-height:80px;margin-top:12px}
.msg-reply-input:focus{outline:none;border-color:var(--ink)}
.msg-stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.msg-stat{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:16px 20px;display:flex;align-items:center;gap:12px}
.msg-stat-num{font-family:'Fraunces',serif;font-size:28px;font-weight:700}
.msg-stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* ANNOUNCEMENTS */
.ann-list{display:flex;flex-direction:column;gap:12px}
.ann-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;border-left:4px solid var(--border);box-shadow:var(--shadow);transition:all .2s}
.ann-card.urgent{border-left-color:var(--constructive);background:#fffaf9}
.ann-card.normal{border-left-color:var(--accent)}
.ann-priority{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.ann-priority.urgent{background:var(--constructive-bg);color:var(--constructive)}
.ann-priority.normal{background:var(--cream);color:var(--muted)}
.ann-title{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--ink);margin-bottom:8px}
.ann-content{font-size:13px;color:#3d3830;line-height:1.65}
.ann-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--cream)}
.ann-date{font-size:11px;color:var(--muted)}

/* POLLS */
.poll-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.poll-question{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--ink);margin-bottom:16px}
.poll-option{margin-bottom:10px}
.poll-option-btn{width:100%;text-align:left;padding:12px 16px;border:1.5px solid var(--border);border-radius:3px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;color:var(--ink)}
.poll-option-btn:hover{border-color:var(--ink);background:var(--cream)}
.poll-option-btn.voted{border-color:var(--accent);background:var(--cream);font-weight:600}
.poll-bar-wrap{margin-top:6px}
.poll-bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
.poll-bar-bg{height:8px;background:var(--cream);border-radius:4px;overflow:hidden}
.poll-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}
.poll-bar-fill.winner{background:var(--positive)}
.poll-footer{font-size:11px;color:var(--muted);margin-top:12px;padding-top:12px;border-top:1px solid var(--cream)}

/* EVALUATIONS */
.eval-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.eval-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.eval-name{font-size:15px;font-weight:600;color:var(--ink)}
.eval-period{font-size:12px;color:var(--muted)}
.eval-criteria{display:flex;flex-direction:column;gap:12px}
.eval-row{display:flex;align-items:center;gap:12px}
.eval-label{width:160px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.eval-stars{display:flex;gap:6px}
.eval-star{width:32px;height:32px;border:1.5px solid var(--border);border-radius:3px;background:var(--white);font-size:16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.eval-star:hover,.eval-star.active{background:var(--accent);border-color:var(--accent);color:white}
.eval-score-display{display:flex;gap:4px}
.eval-score-dot{width:12px;height:12px;border-radius:50%;background:var(--cream)}
.eval-score-dot.filled{background:var(--accent)}

/* EMPLOYEE OF MONTH */
.eom-card{background:linear-gradient(135deg,#0a0060 0%,#13029e 100%);border-radius:var(--radius-lg);padding:40px 32px;text-align:center;margin-bottom:32px;box-shadow:var(--shadow-md)}
.eom-crown{font-size:48px;margin-bottom:12px}
.eom-name{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--paper);margin-bottom:6px}
.eom-dept{font-size:13px;color:rgba(245,240,232,.45);margin-bottom:12px}
.eom-reason{font-size:14px;color:rgba(245,240,232,.7);line-height:1.6;max-width:500px;margin:0 auto}
.eom-month{font-size:11px;color:rgba(245,240,232,.3);margin-top:16px;text-transform:uppercase;letter-spacing:.1em}

/* BIRTHDAY */
.bday-card{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:12px}
.bday-icon{font-size:28px;flex-shrink:0}
.bday-name{font-size:14px;font-weight:600;color:var(--ink)}
.bday-date{font-size:12px;color:var(--muted)}
.bday-today{background:#fff8e1;border-color:#ffd54f}

/* AVATAR PHOTO */
.avatar-photo{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0}
.avatar-photo-lg{width:50px;height:50px;border-radius:50%;object-fit:cover}
.avatar-photo-xl{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.2)}
.avatar-photo-eom{width:100px;height:100px;border-radius:50%;object-fit:cover;border:4px solid rgba(245,240,232,.3);margin:0 auto 16px}
.profile-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;margin-bottom:24px;box-shadow:var(--shadow-md)}

<body>
<div id="app"></div>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://jdopriegkcfwiljcifyl.supabase.co',
  'sb_publishable_cb_xRLjTRtrfmuemXyk3LA_4LBMl327'
);

const TEAMS = ['Comercial','Financeiro','Projetos','Finalização'];
const WORK_START = 9;
const WORK_HOURS = 8;
const LUNCH_HOURS = 1;
const categories = ['Desempenho','Comunicação','Trabalho em Equipe','Liderança','Resultados','Inovação','Atendimento','Comportamento'];

// ── Persistent Session ──────────────────────────────────────────────────────
function saveSession(user){
  try{ localStorage.setItem('flow_session', JSON.stringify({ id: user.id, email: user.email, password: user.password })); }catch(e){}
}
function clearSession(){
  try{ localStorage.removeItem('flow_session'); }catch(e){}
}
async function restoreSession(){
  try{
    const saved = localStorage.getItem('flow_session');
    if(!saved) return false;
    const s = JSON.parse(saved);
    const { data } = await sb.from('users').select('*').eq('id', s.id).eq('password', s.password).single();
    if(data){
    state.currentUser = data;
    await loadData();
    // Track first access on restore too
    if(!data.first_access){
      await sb.from('users').update({ first_access: new Date().toISOString() }).eq('id', data.id);
      const adminIds = (state.users||[]).filter(u=>u.role==='admin').map(u=>u.id);
      if(adminIds.length > 0) createNotifForUsers(adminIds, '👋', data.name + ' fez seu primeiro acesso ao FLOW!', 'users');
    }
    return true;
  }
    clearSession(); return false;
  }catch(e){ return false; }
}

let state = {
  currentUser: null,
  users: [],
  feedbacks: [],
  view: 'dashboard',
  loading: false,
  showModal: false,
  showUserModal: false,
  typeFilter: 'all',
  form: { toId:'', type:'positive', category:'Desempenho', title:'', content:'' },
  userForm: { name:'', email:'', password:'', role:'employee', department:'', birthday:'' },
  loginEmail: '',
  loginPassword: '',
  loginError: '',
  loginLoading: false,
  toast: null,
  confirm: null,
  messages: [],
  announcements: [],
  showAnnModal: false,
  annForm: { title:'', content:'', priority:'normal' },
  polls: [],
  pollVotes: [],
  showPollModal: false,
  pollForm: { question:'', options:['',''] },
  evaluations: [],
  showEvalModal: false,
  evalForm: { toId:'', month: new Date().getMonth()+1, year: new Date().getFullYear(), scores:{}, notes:'' },
  employeeOfMonth: [],
  showEomModal: false,
  eomForm: { userId:'', reason:'' },
  showBirthdayModal: false,
  birthdayForm: { userId:'', name:'', birthday:'' },
  showEditUserModal: false,
  editUserForm: { id:'', name:'', email:'', role:'', department:'', password:'' },
  showPasswordModal: false,
  passwordForm: { current:'', new1:'', new2:'' },
  passwordError: '',
  timeRecords: [],
  todayRecord: null,
  clockTime: new Date(),
  timeViewMonth: new Date().getMonth(),
  timeViewYear: new Date().getFullYear(),
  showEditTimeModal: false,
  editTimeForm: { id:'', user_name:'', date:'', entry_time:'', lunch_out:'', lunch_in:'', exit_time:'' },
  allUsersTimeRecords: [],
  absences: [],
  showAbsenceModal: false,
  absenceForm: { date:'', reason:'', file: null },
  showReviewModal: false,
  reviewForm: { id:'', user_name:'', date:'', reason:'', attachment_url:'', admin_note:'' },
  events: [],
  showEventModal: false,
  eventForm: { title:'', description:'', event_date:'', event_time:'', color:'accent' },
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear(),
  personalEvents: [],
  showPersonalEventModal: false,
  personalEventForm: { title:'', description:'', event_date:'', event_time:'' },
  notifications: JSON.parse(localStorage.getItem('flow_notifs')||'[]'),
  showNotifDropdown: false,
  lastNotifPollTime: null,
  feedbackFilter: { userId: '', type: 'all' },
  aiMessages: [],
  aiLoading: false,
  aiInput: '',
  showMsgModal: false,
  msgForm: { type:'Elogio', title:'', content:'' },
  replyText: '',
  replyingId: null,
};

// Helpers
function initials(name){ return name ? name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase() : '?'; }
function getUserById(id){ return state.users.find(u=>u.id===id); }
function fmt(date){ return new Date(date).toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'}); }
function today(){ return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }

// Access control helpers
function getMyTeamMembers(){
  const u = state.currentUser;
  if(u.role === 'admin' || u.role === 'manager') return state.users.filter(x => x.role === 'employee');
  if(u.role === 'leader') return state.users.filter(x => x.role === 'employee' && x.department === u.department);
  return [];
}

function getVisibleFeedbacks(){
  const u = state.currentUser;
  if(u.role === 'admin' || u.role === 'manager') return state.feedbacks;
  if(u.role === 'leader'){
    const myTeamIds = getMyTeamMembers().map(x => x.id);
    return state.feedbacks.filter(f => myTeamIds.includes(f.to_id));
  }
  return state.feedbacks.filter(f => f.to_id === u.id);
}

function canGiveFeedbackTo(targetUser){
  const u = state.currentUser;
  if(u.role === 'admin') return true;
  if(u.role === 'manager') return targetUser.role === 'employee' || targetUser.role === 'leader';
  if(u.role === 'leader') return targetUser.role === 'employee' && targetUser.department === u.department;
  return false;
}

function showToast(msg){
  state.toast = msg; render();
  setTimeout(()=>{ state.toast=null; render(); }, 3000);
}

async function loadData(){
  const [{ data: users }, { data: feedbacks }] = await Promise.all([
    sb.from('users').select('*').order('name'),
    sb.from('feedbacks').select('*').order('created_at', { ascending: false })
  ]);
  state.users = users || [];
  state.feedbacks = feedbacks || [];
  const { data: messages } = await sb.from('messages').select('*').order('created_at', { ascending: false });
  state.messages = messages || [];
  const { data: announcements } = await sb.from('announcements').select('*').order('created_at', { ascending: false });
  state.announcements = announcements || [];
  const { data: polls } = await sb.from('polls').select('*').order('created_at', { ascending: false });
  state.polls = polls || [];
  const { data: pollVotes } = await sb.from('poll_votes').select('*');
  state.pollVotes = pollVotes || [];
  const { data: evaluations } = await sb.from('evaluations').select('*').order('created_at', { ascending: false });
  state.evaluations = evaluations || [];
  const { data: eom } = await sb.from('employee_of_month').select('*').order('created_at', { ascending: false });
  state.employeeOfMonth = eom || [];
  const { data: events } = await sb.from('events').select('*').order('event_date');
  state.events = events || [];
  const { data: personalEvents } = await sb.from('personal_events').select('*').eq('user_id', state.currentUser.id).order('event_date');
  state.personalEvents = personalEvents || [];
  // Load only unread notifications from DB
  const { data: dbNotifs } = await sb.from('notifications').select('*').eq('user_id', state.currentUser.id).eq('read', false).order('created_at', { ascending: false }).limit(50);
  state.notifications = dbNotifs || [];
  // Load time records
  const todayStr2 = new Date().toISOString().slice(0,10);
  // Load time records - admin/leader see all, employee sees own
  let timeQuery = sb.from('time_records').select('*').order('date', { ascending: false });
  if(state.currentUser.role === 'employee'){
    timeQuery = timeQuery.eq('user_id', state.currentUser.id).limit(60);
  } else if(state.currentUser.role === 'admin' || state.currentUser.role === 'manager'){
    timeQuery = timeQuery.limit(500);
  } else if(state.currentUser.role === 'leader'){
    // Leader sees their team
    const teamIds = (state.users||[]).filter(u=>u.role==='employee'&&u.department===state.currentUser.department).map(u=>u.id);
    teamIds.push(state.currentUser.id);
    timeQuery = timeQuery.in('user_id', teamIds).limit(200);
  }
  const { data: timeRecs } = await timeQuery;
  state.timeRecords = timeRecs || [];
  state.allUsersTimeRecords = (state.currentUser.role==='admin'||state.currentUser.role==='manager') ? (timeRecs || []) : [];
  state.todayRecord = state.timeRecords.find(r=>r.date===todayStr2 && r.user_id===state.currentUser.id) || null;
  const { data: absencesData } = await sb.from('absences').select('*').order('date', { ascending: false });
  state.absences = absencesData || [];
  // Start event reminder checker
  startEventReminders();
  // Start clock
  setInterval(()=>{ state.clockTime = new Date(); if(document.getElementById('liveClock')) document.getElementById('liveClock').textContent = state.clockTime.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }, 1000);
}

async function handleLogin(){
  state.loginLoading = true; state.loginError = ''; render();
  const { data, error } = await sb.from('users')
    .select('*').eq('email', state.loginEmail).eq('password', state.loginPassword).single();
  if(error || !data){
    state.loginError = 'E-mail ou senha incorretos.';
    state.loginLoading = false; render(); return;
  }
  state.currentUser = data;
  state.loginLoading = false;
  saveSession(data);
  await loadData();
  // Track first access
  if(!data.first_access){
    await sb.from('users').update({ first_access: new Date().toISOString() }).eq('id', data.id);
    // Notify all admins
    const adminIds = state.users.filter(u=>u.role==='admin').map(u=>u.id);
    createNotifForUsers(adminIds, '👋', data.name + ' fez seu primeiro acesso ao FLOW!', 'users');
  }
  requestNotificationPermission();
  startNotifPolling();
  startRealtime();
  render();
}

async function deleteFeedback(id){
  const { error } = await sb.from('feedbacks').delete().eq('id', id);
  if(!error){
    state.feedbacks = state.feedbacks.filter(f=>f.id!==id);
    state.confirm = null;
    showToast('Feedback excluído.');
  }
}

async function deleteUser(id){
  // Delete all related records first in correct order
  await sb.from('notifications').delete().eq('user_id', id);
  await sb.from('absences').delete().eq('user_id', id);
  await sb.from('time_records').delete().eq('user_id', id);
  await sb.from('poll_votes').delete().eq('user_id', id);
  await sb.from('evaluations').delete().eq('from_id', id);
  await sb.from('evaluations').delete().eq('to_id', id);
  await sb.from('employee_of_month').delete().eq('user_id', id);
  await sb.from('messages').delete().eq('from_id', id);
  await sb.from('personal_events').delete().eq('user_id', id);
  await sb.from('feedbacks').delete().eq('from_id', id);
  await sb.from('feedbacks').delete().eq('to_id', id);
  await sb.from('announcements').delete().eq('from_id', id);
  await sb.from('polls').delete().eq('from_id', id);

async function submitFeedback(){
  const f = state.form;
  if(!f.toId || !f.title || !f.content) return;
  const { data, error } = await sb.from('feedbacks').insert({
    from_id: state.currentUser.id, to_id: f.toId,
    type: f.type, category: f.category, title: f.title, content: f.content
  }).select().single();
  if(!error && data){
    state.feedbacks = [data, ...state.feedbacks];
    state.showModal = false;
    // Send push notification to recipient
    const toUser = getUserById(f.toId);
    const fromUser = state.currentUser;
    sendPushNotification(toUser, fromUser, f.title, f.type);
    addNotification(f.type==='positive'?'✦':'△', `<strong>${fromUser.name}</strong> registrou um feedback: ${f.title}`, 'dashboard');
    if(toUser) createNotifForUsers([toUser.id], f.type==='positive'?'✦':'△', `${fromUser.name} registrou um feedback para você: ${f.title}`, 'dashboard');
    state.form = { toId:'', type:'positive', category:'Desempenho', title:'', content:'' };
    showToast('✦ Feedback registrado com sucesso!');
  }
}

async function submitUser(){
  const u = state.userForm;
  if(!u.name || !u.email || !u.password || !u.role) return;
  const { data, error } = await sb.from('users').insert({
    name:u.name, email:u.email, password:u.password, role:u.role, department:u.department, avatar:initials(u.name), avatar_url:null, birthday:u.birthday||null

// ── Realtime ─────────────────────────────────────────────────────────────────
function startRealtime(){
  sb.channel('rt-notifications')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${state.currentUser.id}` },
      payload => {
        if(!state.notifications.find(n=>n.id===payload.new.id)){
          state.notifications = [payload.new, ...state.notifications].slice(0,50);
          render();
          if(Notification.permission==='granted'){
            new Notification('🔔 FLOW — SP Traduções', { body: payload.new.text.replace(/<[^>]+>/g,''), tag:'flow-'+payload.new.id });
          }
        }
      })
    .subscribe();

  sb.channel('rt-feedbacks')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'feedbacks' },
      payload => {
        if(!state.feedbacks.find(f=>f.id===payload.new.id)){
          state.feedbacks = [payload.new, ...state.feedbacks];
          render();
        }
      })
    .subscribe();

  sb.channel('rt-announcements')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'announcements' },
      async () => {
        const { data } = await sb.from('announcements').select('*').order('created_at', { ascending: false });
        state.announcements = data || [];
        render();
      })
    .subscribe();

  sb.channel('rt-polls')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'polls' },
      async () => {
        const { data } = await sb.from('polls').select('*').order('created_at', { ascending: false });
        state.polls = data || [];
        render();
      })
    .subscribe();

  sb.channel('rt-poll-votes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'poll_votes' },
      async () => {
        const { data } = await sb.from('poll_votes').select('*');
        state.pollVotes = data || [];
        render();
      })
    .subscribe();

  sb.channel('rt-messages')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' },
      async () => {
        const u = state.currentUser;
        const { data } = await sb.from('messages').select('*').order('created_at', { ascending: false });
        state.messages = u.role==='admin' ? (data||[]) : (data||[]).filter(m=>m.from_id===u.id);
        render();
      })
    .subscribe();

  sb.channel('rt-time-records')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'time_records' },
      async () => {
        const todayStr = new Date().toISOString().slice(0,10);
        const { data } = await sb.from('time_records').select('*').eq('user_id', state.currentUser.id).order('date', { ascending: false }).limit(60);
        if(data){
          state.timeRecords = [...(data||[]), ...state.timeRecords.filter(r=>r.user_id!==state.currentUser.id)];
          state.todayRecord = data.find(r=>r.date===todayStr) || null;
          render();
        }
      })
    .subscribe();
}

async function requestNotificationPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    await Notification.requestPermission();
  }
}

function sendPushNotification(toUser, fromUser, feedbackTitle, feedbackType){
  if(!('Notification' in window)) return;
  if(Notification.permission !== 'granted') return;
  const icon = feedbackType === 'positive' ? '✦' : '△';
  const typeLabel = feedbackType === 'positive' ? 'Positivo' : 'Construtivo';
  new Notification(`${icon} Novo Feedback ${typeLabel} — FLOW`, {
    body: `${fromUser.name} registrou um feedback para você: "${feedbackTitle}"`,
    icon: '/favicon.ico',
    tag: 'flow-feedback',
  });
}

function timeAgo(iso){
  const diff = Date.now() - new Date(iso||Date.now()).getTime();
  const m = Math.floor(diff/60000);
  const h = Math.floor(m/60);
  const d = Math.floor(h/24);
  if(d>0) return d+'d atrás';
  if(h>0) return h+'h atrás';
  if(m>0) return m+'min atrás';
  return 'agora';
}

// Poll for new notifications every 30 seconds
function startNotifPolling(){
  const pollStart = new Date().toISOString();
  setInterval(async ()=>{
    if(!state.currentUser) return;
    const since = state.lastNotifPollTime || pollStart;
    const { data } = await sb.from('notifications')
      .select('*').eq('user_id', state.currentUser.id).eq('read', false)
      .gt('created_at', since).order('created_at', { ascending: false }).limit(20);
    state.lastNotifPollTime = new Date().toISOString();
    if(data && data.length > 0){
      const fresh = data.filter(n=>!state.notifications.find(x=>x.id===n.id));
      if(fresh.length > 0){
        state.notifications = [...fresh, ...state.notifications].slice(0,50);
        render();
        fresh.forEach(n=>{
          if(Notification.permission==='granted'){
            new Notification('🔔 FLOW — SP Traduções', { body: n.text.replace(/<[^>]+>/g,''), tag: 'flow-'+n.id });
          }
        });
      }
    }
  }, 30000);
}

async function punch(type){
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const field = { entry:'entry_time', 'lunch-out':'lunch_out', 'lunch-in':'lunch_in', exit:'exit_time' }[type];

  if(state.todayRecord){
    // Update existing record
    const update = { [field]: now.toISOString() };
    // Calculate total hours if exiting
    if(type === 'exit' && state.todayRecord.entry_time){
      const entry = new Date(state.todayRecord.entry_time);
      const lunchOut = state.todayRecord.lunch_out ? new Date(state.todayRecord.lunch_out) : null;
      const lunchIn = state.todayRecord.lunch_in ? new Date(state.todayRecord.lunch_in) : null;
      let total = (now - entry) / 3600000;
      if(lunchOut && lunchIn) total -= (lunchIn - lunchOut) / 3600000;
      else if(lunchOut) total -= (now - lunchOut) / 3600000;
      update.total_hours = Math.round(total * 100) / 100;
    }
    const { data, error } = await sb.from('time_records').update(update).eq('id', state.todayRecord.id).select().single();
    if(!error){
      state.todayRecord = data;
      state.timeRecords = state.timeRecords.map(r=>r.id===data.id?data:r);
      showToast(`✦ ${punchLabel(type)} registrado às ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`);
      render();
    }
  } else {
    // Create new record
    const { data, error } = await sb.from('time_records').insert({
      user_id: state.currentUser.id, date: todayStr, [field]: now.toISOString()
    }).select().single();
    if(!error){
      state.todayRecord = data;
      state.timeRecords = [data, ...state.timeRecords];
      showToast(`✦ ${punchLabel(type)} registrado às ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`);
      render();
    }
  }
}

function punchLabel(type){
  return { entry:'Entrada', 'lunch-out':'Saída para almoço', 'lunch-in':'Retorno do almoço', exit:'Saída' }[type];
}

function formatTime(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function calcHours(rec){
  if(!rec || !rec.entry_time || !rec.exit_time) return null;
  const entry = new Date(rec.entry_time);
  const exit = new Date(rec.exit_time);
  const lunchOut = rec.lunch_out ? new Date(rec.lunch_out) : null;
  const lunchIn = rec.lunch_in ? new Date(rec.lunch_in) : null;
  let total = (exit - entry) / 3600000;
  if(lunchOut && lunchIn) total -= (lunchIn - lunchOut) / 3600000;
  else total -= LUNCH_HOURS;
  return Math.max(0, Math.round(total * 100) / 100);
}

function calcBalance(recs){
  const completed = recs.filter(r=>r.entry_time && r.exit_time);
  const totalWorked = completed.reduce((sum,r)=>sum+(calcHours(r)||0),0);
  const totalExpected = completed.length * WORK_HOURS;
  const balance = totalWorked - totalExpected;
  const lateDays = recs.filter(r=>{
    if(!r.entry_time) return false;
    const d = new Date(r.entry_time);
    return d.getHours() > WORK_START || (d.getHours()===WORK_START && d.getMinutes()>5);
  }).length;
  const overtimeDays = completed.filter(r=>(calcHours(r)||0)>WORK_HOURS).length;
  return { totalWorked:Math.round(totalWorked*100)/100, totalExpected, balance:Math.round(balance*100)/100, lateDays, overtimeDays, days:completed.length };
}

function formatBalance(hours){
  const abs = Math.abs(hours);
  const h = Math.floor(abs);
  const m = Math.round((abs-h)*60);
  const sign = hours>=0?'+':'-';
  return sign+h+'h'+(m>0?m+'min':'');
}

async function saveEditTimeRecord(){
  const f = state.editTimeForm;
  const toISO = (dateStr, timeStr) => {
    if(!timeStr) return null;
    return new Date(dateStr + 'T' + timeStr + ':00').toISOString();
  };
  const update = {
    entry_time: toISO(f.date, f.entry_time),
    lunch_out: toISO(f.date, f.lunch_out),
    lunch_in: toISO(f.date, f.lunch_in),
    exit_time: toISO(f.date, f.exit_time),
  };
  // Recalculate total hours
  if(update.entry_time && update.exit_time){
    const entry = new Date(update.entry_time);
    const exit = new Date(update.exit_time);
    const lunchOut = update.lunch_out ? new Date(update.lunch_out) : null;
    const lunchIn = update.lunch_in ? new Date(update.lunch_in) : null;
    let total = (exit - entry) / 3600000;
    if(lunchOut && lunchIn) total -= (lunchIn - lunchOut) / 3600000;
    else total -= LUNCH_HOURS;
    update.total_hours = Math.max(0, Math.round(total * 100) / 100);
  }
  const { data, error } = await sb.from('time_records').update(update).eq('id', f.id).select().single();
  if(!error && data){
    state.timeRecords = state.timeRecords.map(r=>r.id===data.id?data:r);
    state.allUsersTimeRecords = state.allUsersTimeRecords.map(r=>r.id===data.id?data:r);
    if(state.todayRecord && state.todayRecord.id===data.id) state.todayRecord = data;
    state.showEditTimeModal = false;
    showToast('✦ Ponto corrigido com sucesso!');
    render();
  }
}

async function submitMessage(){
  const f = state.msgForm;
  if(!f.title || !f.content) return;
  const { data, error } = await sb.from('messages').insert({
    from_id: state.currentUser.id,
    type: f.type, title: f.title, content: f.content
  }).select().single();
  if(!error && data){
    state.messages = [data, ...state.messages];
    state.showMsgModal = false;
    state.msgForm = { type:'Elogio', title:'', content:'' };
    // Notify all admins
    const adminIds = state.users.filter(u=>u.role==='admin').map(u=>u.id);
    createNotifForUsers(adminIds, '✉', `Nova mensagem de ${state.currentUser.name}: ${data.title}`, 'messages');
    showToast('✦ Mensagem enviada com sucesso!');
  }
}

async function submitReply(msgId){
  if(!state.replyText.trim()) return;
  const { data, error } = await sb.from('messages')
    .update({ reply: state.replyText, replied_at: new Date().toISOString() })
    .eq('id', msgId).select().single();
  if(!error && data){
    state.messages = state.messages.map(m => m.id===msgId ? data : m);
    state.replyingId = null;
    state.replyText = '';
    // notify the message sender
    const origMsg = state.messages.find(m=>m.id===msgId);
    if(origMsg) createNotifForUsers([origMsg.from_id], '✉', 'Alex respondeu sua mensagem', 'messages');
    addNotification('✉', `<strong>Alex respondeu</strong> uma mensagem`, 'messages');
    if(Notification.permission==='granted'){
      new Notification('✉ Alex respondeu sua mensagem — FLOW', { body: state.replyText, tag:'flow-reply' });
    }
    showToast('Resposta enviada!');
  }
}

  return `

function bindLogin(){
  document.getElementById('lemail').oninput = e => state.loginEmail = e.target.value;
  document.getElementById('lpass').oninput = e => state.loginPassword = e.target.value;
  document.getElementById('lpass').onkeydown = e => { if(e.key==='Enter') handleLogin(); };
  document.getElementById('lbtn').onclick = handleLogin;
}

function renderPeople(){
  const u = state.currentUser;
  const members = getMyTeamMembers();

  if(u.role === 'admin' || u.role === 'manager'){
    // Admin/Manager sees all teams grouped
    return TEAMS.map(team => {
      const teamMembers = state.users.filter(x => x.role === 'employee' && x.department === team);
      const teamLeader = state.users.find(x => x.role === 'leader' && x.department === team);
      if(teamMembers.length === 0 && !teamLeader) return '';
      return `
        <div class="section">
          <div class="section-header">
            <div>
              <div class="section-title">Time de ${team}</div>
              ${teamLeader ? `<div style="font-size:12px;color:var(--muted);margin-top:3px">Líder: ${teamLeader.name}</div>` : '<div style="font-size:12px;color:var(--constructive);margin-top:3px">Sem líder cadastrado</div>'}
            </div>
            <span class="section-count">${teamMembers.length} colaborador${teamMembers.length!==1?'es':''}</span>
          </div>
          <div class="people-grid">
            ${teamMembers.length === 0 ? '<div style="color:var(--muted);font-size:13px">Nenhum colaborador neste time.</div>' :
              teamMembers.map(emp => renderPersonCard(emp)).join('')}

        </div>`;
    }).join('');

  return `

      <div class="section-header">

        ? `<div class="empty-state"><div class="empty-icon">◎</div><div class="empty-title">Nenhum colaborador</div><div class="empty-text">Ainda não há colaboradores cadastrados no time de ${u.department}.</div></div>`

    </div>`;
}

function renderPersonCard(emp){
  const u = state.currentUser;
  const visible = getVisibleFeedbacks();

  const con = fbs.filter(f=>f.type==='constructive').length;
  const canGive = canGiveFeedbackTo(emp);
  return `
    <div class="person-card">
      ${emp.avatar_url ? `<img src="${emp.avatar_url}" class="avatar-photo" style="width:50px;height:50px;border-radius:50%;object-fit:cover" alt="${emp.name}">` : `<div class="person-avatar">${initials(emp.name)}</div>`}
      <div>
        <div class="person-name">${emp.name}</div>
        <div class="person-dept">${emp.department||'—'}</div>
        <div class="person-counts">${fbs.length} feedback${fbs.length!==1?'s':''} · <span style="color:var(--positive)">${pos}✦</span> <span style="color:var(--constructive)">${con}△</span></div>
      </div>
      ${canGive ? `<button class="btn btn-secondary btn-sm" data-quick-fb="${emp.id}">${svgIcon('add')} Feedback</button>` : ''}

}

function renderMessages(){

  const isAdmin = u.role === 'admin';

  const typeColors = { Elogio:'elogio', Crítica:'critica', Reclamação:'reclamacao', Sugestão:'sugestao' };
  const typeEmoji = { Elogio:'✦', Crítica:'△', Reclamação:'⚠', Sugestão:'💡' };

  return `
    <div class="msg-stats">
      <div class="msg-stat">
        <div class="msg-stat-num" style="color:var(--accent)">${msgs.length}</div>
        <div class="msg-stat-label">Total de<br>Mensagens</div>
      </div>
      <div class="msg-stat">
        <div class="msg-stat-num" style="color:var(--constructive)">${unread}</div>
        <div class="msg-stat-label">Sem<br>Resposta</div>
      </div>
      <div class="msg-stat">
        <div class="msg-stat-num" style="color:var(--positive)">${msgs.length - unread}</div>
        <div class="msg-stat-label">Respondidas</div>
      </div>
    </div>
    <div class="section">
      <div class="section-header">
        <div class="section-title">${isAdmin ? 'Todas as Mensagens' : 'Minhas Mensagens'}</div>

      ${msgs.length === 0 ? `
        <div class="empty-state">
          <div class="empty-icon">✉</div>
          <div class="empty-title">${isAdmin ? 'Nenhuma mensagem ainda' : 'Nenhuma mensagem enviada'}</div>

        </div>` :
        `<div class="msg-list">${msgs.map(m => {
          const from = getUserById(m.from_id);
          const isReplying = state.replyingId === m.id;
          return `
            <div class="msg-card ${!m.reply ? 'unread' : ''}">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <span class="msg-type-badge msg-${typeColors[m.type]||'elogio'}">${typeEmoji[m.type]||'✦'} ${m.type}</span>
                <span style="font-size:11px;color:var(--muted)">${fmt(m.created_at)}</span>

              <div class="msg-title">${m.title}</div>
              <div class="msg-content">${m.content}</div>
              ${isAdmin ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px"><div class="msg-from">De: <strong>${from ? from.name : 'Desconhecido'}</strong>${from && from.department ? ' · '+from.department : ''}</div><button class="btn btn-danger btn-sm" data-delete-msg="${m.id}" data-delete-msg-title="Mensagem de ${from?from.name:'?'}">🗑 Excluir</button></div>` : ''}
              ${m.reply ? `
                <div class="msg-reply-box">

                  <div class="msg-reply-text">${m.reply}</div>
                  <div style="font-size:11px;color:var(--muted);margin-top:6px">${fmt(m.replied_at)}</div>

                <div style="margin-top:12px">
                  ${isReplying ? `
                    <textarea class="msg-reply-input" id="replyInput_${m.id}" placeholder="Escreva sua resposta...">${state.replyText}</textarea>

                      <button class="btn btn-primary btn-sm" data-submit-reply="${m.id}">Enviar Resposta</button>
                      <button class="btn btn-secondary btn-sm" data-cancel-reply="${m.id}">Cancelar</button>

                    <button class="btn btn-secondary btn-sm" data-reply="${m.id}">Responder</button>`}

            </div>`;
        }).join('')}</div>`}
    </div>`;
}

function renderTimeClock(){
  const u = state.currentUser;
  const isAdmin = u.role==='admin' || u.role==='manager';

  // Determine next punch
  const nextPunch = !r || !r.entry_time ? 'entry'
    : !r.lunch_out ? 'lunch-out'
    : !r.lunch_in ? 'lunch-in'
    : !r.exit_time ? 'exit'
    : 'done';

  // Filter records for current view month (own records only)

    const d = new Date(rec.date+'T12:00:00');

  const totalMonthHours = viewRecs.reduce((sum,rec)=>sum+(rec.total_hours||calcHours(rec)||0),0);

                const d = new Date(r.date+'T12:00:00');
                return d.getMonth()===state.timeViewMonth && d.getFullYear()===state.timeViewYear;

                const dt = new Date(rec.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
                const isLateR = rec.entry_time && (new Date(rec.entry_time).getHours()>WORK_START||(new Date(rec.entry_time).getHours()===WORK_START&&new Date(rec.entry_time).getMinutes()>5));

function renderCalendar(){
  const u = state.currentUser;
  const isAdmin = u.role==='admin';
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const m = state.calMonth;
  const y = state.calYear;
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev = new Date(y, m, 0).getDate();
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  const allPersonal = state.personalEvents || [];
  const allCompany = state.events || [];

  const upcoming = [...allCompany.filter(e=>e.event_date >= todayStr), ...allPersonal.filter(e=>e.event_date >= todayStr)]
    .sort((a,b)=>a.event_date.localeCompare(b.event_date)).slice(0,8);

  let cells = '';
  for(let i=firstDay-1;i>=0;i--){
    cells += `<div class="cal-cell other-month"><div class="cal-date">${daysInPrev-i}</div></div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const dateStr = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday = dateStr===todayStr;
    const dayEvents = allCompany.filter(e=>e.event_date===dateStr);
    const dayPersonal = allPersonal.filter(e=>e.event_date===dateStr);
    const dayBirthdays = state.users.filter(u=>{
      if(!u.birthday) return false;
      return u.birthday.slice(5,10) === dateStr.slice(5,10);
    });
    cells += `<div class="cal-cell ${isToday?'today':''}">
      <div class="cal-date">${d}</div>
      ${dayEvents.map(e=>`<div class="cal-event-pill company" title="${e.title}">${e.title}</div>`).join('')}
      ${dayPersonal.map(e=>`<div class="cal-event-pill personal" title="${e.title}">🔒 ${e.title}</div>`).join('')}
      ${dayBirthdays.map(u=>`<div class="cal-event-pill" style="background:#fff3cd;color:#856404" title="Aniversário de ${u.name}">🎂 ${u.name.split(' ')[0]}</div>`).join('')}
    </div>`;
  }
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  for(let d=1;d<=totalCells-(firstDay+daysInMonth);d++){
    cells += `<div class="cal-cell other-month"><div class="cal-date">${d}</div></div>`;
  }

  const dayNames = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  const renderEventItem = (e, isPersonal) => {
    const dt = new Date(e.event_date+'T12:00:00');
    const day = dt.getDate();
    const mon = dt.toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
    const deleteBtn = isPersonal
      ? `<button class="btn btn-danger btn-sm" data-delete-personal-event="${e.id}" data-delete-personal-title="${e.title.replace(/"/g,'&quot;')}">🗑</button>`
      : (isAdmin ? `<button class="btn btn-danger btn-sm" data-delete-event="${e.id}" data-delete-event-title="${e.title.replace(/"/g,'&quot;')}">🗑</button>` : '');
    return `<div class="event-card" style="${isPersonal?'border-left-color:#6a3d9a':''}">
      <div class="event-date-badge">
        <div class="event-day">${day}</div>
        <div class="event-month">${mon}</div>
      </div>
      <div style="flex:1">
        <div class="event-title">${isPersonal?'🔒 ':''}${e.title}</div>
        ${e.description ? `<div class="event-desc">${e.description}</div>` : ''}
        ${e.event_time ? `<div class="event-time">🕐 ${e.event_time.slice(0,5)}</div>` : ''}
      </div>
      ${deleteBtn}
    </div>`;
  };

  return `

function renderPolls(){
  const u = state.currentUser;
  const isAdmin = u.role==='admin';
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  return `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Enquetes</div>
      </div>
      ${state.polls.length===0 ? `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Nenhuma enquete ainda</div><div class="empty-text">O admin pode criar enquetes para o time votar.</div></div>` :
        state.polls.map(poll=>{
          const votes = state.pollVotes.filter(v=>v.poll_id===poll.id);
          const myVote = votes.find(v=>v.user_id===u.id);
          const total = votes.length;
          const options = poll.options;
          const counts = options.map((_,i)=>votes.filter(v=>v.option_index===i).length);
          const maxCount = Math.max(...counts);
          return `
            <div class="poll-card">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <span class="badge badge-category">${poll.active?'✦ Ativa':'Encerrada'}</span>
                <span style="font-size:11px;color:var(--muted)">${fmt(poll.created_at)}</span>
              </div>
              <div class="poll-question">${poll.question}</div>
              ${options.map((opt,i)=>{
                const count = counts[i];
                const pct = total>0 ? Math.round(count/total*100) : 0;
                const isWinner = count===maxCount && count>0;
                const voted = myVote?.option_index===i;
                if(myVote || !poll.active){
                  return `<div class="poll-option">
                    <div class="poll-bar-wrap">
                      <div class="poll-bar-label"><span>${opt}${voted?' ✓':''}</span><span>${pct}%${isAdmin?` (${count} voto${count!==1?'s':''})`:(myVote?` (${total} voto${total!==1?'s':''})`:'')}</span></div>
                      <div class="poll-bar-bg"><div class="poll-bar-fill ${isWinner?'winner':''}" style="width:${pct}%"></div></div>
                    </div>
                  </div>`;
                }
                return `<div class="poll-option">
                  <button class="poll-option-btn" data-vote-poll="${poll.id}" data-vote-opt="${i}">${opt}</button>
                </div>`;
              }).join('')}
              <div class="poll-footer">
                ${total} voto${total!==1?'s':''} · ${poll.active?'Votação aberta':'Votação encerrada'}
                ${isAdmin && poll.active ? `<button class="btn btn-secondary btn-sm" style="margin-left:12px" data-close-poll="${poll.id}">Encerrar</button>` : ''}
              ${isAdmin ? `<button class="btn btn-danger btn-sm" style="margin-left:8px" data-delete-poll="${poll.id}" data-delete-poll-title="${poll.question.replace(/"/g,'&quot;')}">🗑 Excluir</button>` : ''}
              </div>
            </div>`;
        }).join('')}
    </div>`;
}

function renderEvals(){
  const u = state.currentUser;
  const canEval = u.role==='admin' || u.role==='leader';
  const criteria = ['Desempenho','Comunicação','Trabalho em Equipe','Pontualidade','Qualidade'];
  const myEvals = canEval
    ? (u.role==='admin' ? state.evaluations : state.evaluations.filter(e=>e.from_id===u.id))
    : state.evaluations.filter(e=>e.to_id===u.id);

  return `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Avaliações de Desempenho</div>
      </div>
      ${myEvals.length===0 ? `<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-title">Nenhuma avaliação ainda</div><div class="empty-text">${canEval?'Clique em Nova Avaliação para avaliar um colaborador.':'Suas avaliações de desempenho aparecerão aqui.'}</div></div>` :
        myEvals.map(ev=>{
          const from = getUserById(ev.from_id);
          const to = getUserById(ev.to_id);
          const scores = ev.scores;
          const avg = Object.values(scores).length>0 ? (Object.values(scores).reduce((a,b)=>a+b,0)/Object.values(scores).length).toFixed(1) : '-';
          const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
          return `
            <div class="eval-card">
              <div class="eval-header">
                <div class="avatar">${to?initials(to.name):'?'}</div>
                <div>
                  <div class="eval-name">${to?to.name:'?'}</div>
                  <div class="eval-period">${months[(ev.month||1)-1]}/${ev.year} · Por ${from?from.name:'?'} · Média: <strong>${avg}/5</strong></div>
                </div>
              </div>
              <div class="eval-criteria">
                ${criteria.map(c=>`
                  <div class="eval-row">
                    <div class="eval-label">${c}</div>
                    <div class="eval-score-display">
                      ${[1,2,3,4,5].map(n=>`<div class="eval-score-dot ${(scores[c]||0)>=n?'filled':''}"></div>`).join('')}
                      <span style="font-size:12px;color:var(--muted);margin-left:6px">${scores[c]||'-'}/5</span>
                    </div>
                  </div>`).join('')}
              </div>
              ${ev.notes ? `<div style="margin-top:16px;padding:12px;background:var(--cream);border-radius:3px;font-size:13px;color:var(--ink)">${ev.notes}</div>` : ''}
              ${(u.role==='admin' || ev.from_id===u.id) ? `<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn btn-danger btn-sm" data-delete-eval="${ev.id}" data-delete-eval-title="Avaliação de ${to?to.name:'?'}">🗑 Excluir</button></div>` : ''}
            </div>`;
        }).join('')}
    </div>`;
}

function renderEom(){
  const u = state.currentUser;
  const now = new Date();
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const currentEom = state.employeeOfMonth.find(e=>e.month===now.getMonth()+1 && e.year===now.getFullYear());
  const currentUser = currentEom ? getUserById(currentEom.user_id) : null;

  // Birthday check
  const today = now.toISOString().slice(5,10);
  const birthdays = state.users.filter(usr=>{
    if(!usr.birthday) return false;
    return usr.birthday.slice(5,10) === today;
  });
  const thisMonthBdays = state.users.filter(usr=>{
    if(!usr.birthday) return false;
    return usr.birthday.slice(5,7) === String(now.getMonth()+1).padStart(2,'0');
  }).sort((a,b)=>a.birthday.slice(8,10)-b.birthday.slice(8,10));

  return `
    ${currentEom && currentUser ? `
      <div class="eom-card">
        <div class="eom-crown">🏆</div>
        ${currentUser.avatar_url ? `<img src="${currentUser.avatar_url}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:4px solid rgba(245,240,232,.3);margin:0 auto 16px;display:block" alt="${currentUser.name}">` : `<div style="width:80px;height:80px;border-radius:50%;background:rgba(245,240,232,.12);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--paper);margin:0 auto 16px">${initials(currentUser.name)}</div>`}
        <div class="eom-name">${currentUser.name}</div>
        <div class="eom-dept">${currentUser.department||'SP Traduções'}</div>
        ${currentEom.reason ? `<div class="eom-reason">${currentEom.reason}</div>` : ''}
        <div class="eom-month">Destaque de ${months[now.getMonth()]} ${now.getFullYear()}</div>
        ${u.role==='admin' ? `<button class="btn btn-danger btn-sm" style="margin-top:16px" data-delete-eom="${currentEom.id}">🗑 Remover Destaque</button>` : ''}
      </div>` : `
      <div class="empty-state" style="margin-bottom:32px">
        <div class="empty-icon">🏆</div>
        <div class="empty-title">Nenhum destaque definido</div>
        <div class="empty-text">${u.role==='admin'?'Clique em Definir Destaque para escolher o colaborador do mês.':'O destaque do mês ainda não foi definido.'}</div>
      </div>`}
    
    <div class="section">
      <div class="section-header">
        <div class="section-title">🎂 Aniversariantes de ${months[now.getMonth()]}</div>
        <span class="section-count">${thisMonthBdays.length} pessoa${thisMonthBdays.length!==1?'s':''}</span>
      </div>
      ${thisMonthBdays.length===0 ? `<div class="empty-state"><div class="empty-icon">🎂</div><div class="empty-title">Nenhum aniversariante este mês</div><div class="empty-text">Os aniversários são preenchidos no cadastro de usuários.</div></div>` :
        thisMonthBdays.map(usr=>{
          const day = usr.birthday ? usr.birthday.slice(8,10) : '?';

async function sendAIMessage(){
  const msg = state.aiInput.trim();
  if(!msg || state.aiLoading) return;
  state.aiMessages = [...state.aiMessages, { role:'user', content: msg }];
  state.aiInput = '';
  state.aiLoading = true;
  render();

  // Build context from system data
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();
  const monthName = now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  const employees = state.users.filter(u=>u.role==='employee');
  const monthRecords = state.timeRecords.filter(r=>{
    const d = new Date(r.date+'T12:00:00');
    return d.getMonth()===thisMonth && d.getFullYear()===thisYear;
  });
  const monthAbsences = state.absences.filter(a=>{
    const d = new Date(a.date+'T12:00:00');
    return d.getMonth()===thisMonth && d.getFullYear()===thisYear;
  });

  // Build summary data
  const empSummary = employees.map(emp=>{
    const fbs = state.feedbacks.filter(f=>f.to_id===emp.id);
    const pos = fbs.filter(f=>f.type==='positive').length;
    const con = fbs.filter(f=>f.type==='constructive').length;
    const recs = monthRecords.filter(r=>r.user_id===emp.id);
    const absences = monthAbsences.filter(a=>a.user_id===emp.id);
    const approvedAbs = absences.filter(a=>a.status==='approved').length;
    const pendingAbs = absences.filter(a=>a.status==='pending').length;
    const rejectedAbs = absences.filter(a=>a.status==='rejected').length;
    const totalHours = recs.reduce((sum,r)=>sum+(r.total_hours||0),0);
    const lateDays = recs.filter(r=>r.entry_time && (new Date(r.entry_time).getHours()>9||(new Date(r.entry_time).getHours()===9&&new Date(r.entry_time).getMinutes()>5))).length;
    return { name:emp.name, dept:emp.department||'—', feedbacksPositivos:pos, feedbacksConstrutivos:con, horasMes:totalHours.toFixed(1), diasRegistrados:recs.length, diasAtraso:lateDays, faltasAprovadas:approvedAbs, faltasPendentes:pendingAbs, faltasNegadas:rejectedAbs };
  });

  const systemPrompt = `Você é um assistente de RH e gestão de pessoas da SP Traduções. Você tem acesso aos dados do sistema FLOW e deve responder perguntas sobre colaboradores, feedbacks, ponto eletrônico, faltas e desempenho. Seja direto, objetivo e em português.

DADOS DO SISTEMA (${monthName}):
${JSON.stringify(empSummary, null, 2)}

TOTAL DE FEEDBACKS: ${state.feedbacks.length} (${state.feedbacks.filter(f=>f.type==='positive').length} positivos, ${state.feedbacks.filter(f=>f.type==='constructive').length} construtivos)
TOTAL DE COLABORADORES: ${employees.length}
ENQUETES ATIVAS: ${state.polls.filter(p=>p.active).length}
AVISOS PUBLICADOS: ${state.announcements.length}

Responda de forma clara e útil. Se a pergunta for sobre dados específicos, cite nomes e números.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: state.aiMessages
      })
    });
    const data = await response.json();
    const reply = data.content?.[0]?.text || 'Não consegui processar sua pergunta. Tente novamente.';
    state.aiMessages = [...state.aiMessages, { role:'assistant', content: reply }];
  } catch(e) {
    state.aiMessages = [...state.aiMessages, { role:'assistant', content: 'Erro ao conectar com a IA. Verifique sua conexão e tente novamente.' }];
  }
  state.aiLoading = false;
  render();
  // Scroll to bottom
  setTimeout(()=>{
    const msgs = document.getElementById('aiMessages');
    if(msgs) msgs.scrollTop = msgs.scrollHeight;
  }, 100);
}

      else if(state.confirm.type==='message') deleteMessage(state.confirm.id);
      else if(state.confirm.type==='poll') deletePoll(state.confirm.id);
